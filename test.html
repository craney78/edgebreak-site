<script>
// =========================
// 🔐 NAV LOGIN / LOGOUT
// =========================

async function setupAuthButton() {

  const btn =
    document.getElementById("authBtn");

  if (!btn) return;

  const {
    data: { session }
  } = await supabaseClient.auth.getSession();

  if (session) {

    btn.innerText = "Logout";
    btn.href = "#";

    btn.onclick = async (e) => {

      e.preventDefault();

      await supabaseClient.auth.signOut();

      window.location.href =
        "login.html";
    };

  } else {

    btn.innerText = "Login";
    btn.href = "login.html";

  }
}

window.addEventListener(
  "load",
  setupAuthButton
);

supabaseClient.auth.onAuthStateChange(
  setupAuthButton
);
</script>
<script>
// =========================
// 📱 MOBILE NAV TOGGLE (FIXED)
// =========================

document.addEventListener("DOMContentLoaded", () => {

  const toggle = document.getElementById("menuToggle");
  const nav = document.getElementById("navLinks");

  if (!toggle || !nav) {
    console.log("❌ Nav elements missing");
    return;
  }

  toggle.addEventListener("click", () => {
    nav.classList.toggle("active");
  });

  document.querySelectorAll("#navLinks a").forEach(link => {
    link.addEventListener("click", () => {
      nav.classList.remove("active");
    });
  });

});
</script>
<script>
document.addEventListener("DOMContentLoaded", async () => {

  const { data: { session } } = await supabaseClient.auth.getSession();

  // If no session → keep locked state
  if (!session || !session.user) return;

  // Get profile
  const { data: profile } = await supabaseClient
    .from("profiles")
    .select("is_active")
    .eq("id", session.user.id)
    .single();

  // If NOT active → keep locked
  if (!profile || profile.is_active !== true) return;

  // ✅ USER IS ACTIVE → UNLOCK NAV

  document.querySelectorAll(".locked-link").forEach(link => {

    // remove lock icon
    const icon = link.querySelector(".lock-icon");
    if (icon) icon.remove();

    // remove locked behaviour
    link.classList.remove("locked-link");

  });

});
</script>
<script>
document.addEventListener("DOMContentLoaded", () => {

  document.querySelectorAll(".locked-link").forEach(link => {
    link.addEventListener("click", function(e) {

      if (this.classList.contains("locked-link")) {
        e.preventDefault();
        window.location.href = "pricing.html";
      }

    });
  });

});
</script>
