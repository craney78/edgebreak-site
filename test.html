/* =====================================================
   EDGEBREAK NAVBAR
   ===================================================== */

:root{

    --edge-nav-bg:#071225;
    --edge-nav-surface:#0d1830;
    --edge-nav-border:rgba(255,255,255,.08);

    --edge-nav-text:#ffffff;
    --edge-nav-text-muted:#c8d3e3;

    --edge-nav-green:#00d26a;
    --edge-nav-green-hover:#00b85d;

    --edge-nav-radius:12px;

    --edge-nav-shadow:
        0 12px 35px rgba(0,0,0,.35);

    --edge-nav-transition:.2s ease;

}


/* =====================================================
   RESET
   ===================================================== */

.edge-navbar,
.edge-navbar *{

    margin:0;
    padding:0;
    box-sizing:border-box;

}

.edge-navbar a{

    text-decoration:none;
    color:inherit;

}

.edge-navbar button{

    font:inherit;
    border:none;
    background:none;
    cursor:pointer;

}

.edge-navbar svg{

    display:block;

}


/* =====================================================
   MAIN NAVBAR
   ===================================================== */

.edge-navbar{

    position:sticky;
    top:0;
    z-index:9999;

    width:100%;
    height:80px;

    background:var(--edge-nav-bg);

    border-bottom:1px solid var(--edge-nav-border);

    box-shadow:var(--edge-nav-shadow);

}

.edge-navbar-inner{

    max-width:1400px;

    height:100%;

    margin:auto;

    padding:0 28px;

    display:flex;
    align-items:center;
    justify-content:space-between;

}


/* =====================================================
   LEFT SIDE
   ===================================================== */

.edge-navbar-left{

    display:flex;
    align-items:center;
    gap:14px;

}

.edge-navbar-logo{

    width:42px;
    height:42px;

    object-fit:contain;

    transition:transform var(--edge-nav-transition);

}

.edge-navbar-logo:hover{

    transform:scale(1.05);

}

.edge-navbar-logo-text{

    font-size:1.55rem;
    font-weight:800;

    letter-spacing:1px;

    color:var(--edge-nav-text);

    transition:color var(--edge-nav-transition);

}

.edge-navbar-logo-text:hover{

    color:var(--edge-nav-green);

}


/* =====================================================
   LIVE BADGE
   ===================================================== */

.edge-navbar-live{

    padding:5px 12px;

    border-radius:999px;

    background:var(--edge-nav-green);

    color:#fff;

    font-size:.72rem;

    font-weight:700;

    letter-spacing:.08em;

    text-transform:uppercase;

}

/* =====================================================
   NAVIGATION
   ===================================================== */

.edge-navbar-links-wrap{

    display:flex;
    align-items:center;
    gap:24px;

    height:100%;

}

.edge-navbar-links{

    display:flex;
    align-items:center;
    gap:8px;

    height:100%;

}


/* =====================================================
   LINKS
   ===================================================== */

.edge-navbar-link,
.edge-navbar-cta{

    display:flex;
    align-items:center;
    gap:10px;

    height:80px;

    padding:0 18px;

    color:var(--edge-nav-text);

    font-size:.95rem;
    font-weight:600;

    transition:all var(--edge-nav-transition);

    position:relative;

    white-space:nowrap;

}


/* Underline Animation */

.edge-navbar-link::after{

    content:"";

    position:absolute;

    left:18px;
    right:18px;
    bottom:18px;

    height:2px;

    background:var(--edge-nav-green);

    transform:scaleX(0);

    transform-origin:center;

    transition:transform var(--edge-nav-transition);

}

.edge-navbar-link:hover{

    color:var(--edge-nav-green);

}

.edge-navbar-link:hover::after{

    transform:scaleX(1);

}


/* =====================================================
   SVG ICONS
   ===================================================== */

.edge-navbar-icon{

    width:18px;
    height:18px;

    flex-shrink:0;

    stroke:currentColor;

    transition:all var(--edge-nav-transition);

}

.edge-navbar-link:hover .edge-navbar-icon{

    transform:translateY(-1px);

}


/* =====================================================
   DROPDOWN CHEVRON
   ===================================================== */

.edge-navbar-chevron{

    width:16px;
    height:16px;

    margin-left:2px;

    stroke:currentColor;

    transition:transform var(--edge-nav-transition);

}

.edge-navbar-dropdown:hover .edge-navbar-chevron{

    transform:rotate(180deg);

}


/* =====================================================
   LOGIN BUTTON
   ===================================================== */

.edge-navbar-cta{

    height:48px;

    margin-left:12px;

    padding:0 24px;

    border-radius:999px;

    background:var(--edge-nav-green);

    color:#ffffff;

}

.edge-navbar-cta:hover{

    background:var(--edge-nav-green-hover);

    color:#ffffff;

    transform:translateY(-2px);

    box-shadow:
        0 10px 24px rgba(0,210,106,.28);

}

.edge-navbar-cta::after{

    display:none;

}


/* =====================================================
   LOCK ICON
   ===================================================== */

.edge-navbar-lock-icon{

    width:15px;
    height:15px;

    margin-left:auto;

    stroke:var(--edge-nav-green);

}

/* =====================================================
   DROPDOWNS
===================================================== */

.edge-navbar-dropdown{

    position:relative;

    height:100%;

    display:flex;
    align-items:center;

}


/* ==========================================
   DROPDOWN PANEL
========================================== */

.edge-navbar-dropdown-content{

    position:absolute;

    top:100%;
    left:0;

    min-width:300px;

    padding:12px;

    background:rgba(13,24,48,.98);

    border:1px solid var(--edge-nav-border);

    border-radius:16px;

    backdrop-filter:blur(18px);

    box-shadow:
        0 18px 45px rgba(0,0,0,.45);

    opacity:0;
    visibility:hidden;

    transform:translateY(15px);

    transition:
        opacity .22s ease,
        transform .22s ease,
        visibility .22s ease;

    z-index:1000;

}


/* ==========================================
   SHOW MENU
========================================== */

.edge-navbar-dropdown:hover
.edge-navbar-dropdown-content{

    opacity:1;

    visibility:visible;

    transform:translateY(8px);

}


/* ==========================================
   DROPDOWN LINKS
========================================== */

.edge-navbar-dropdown-content a{

    display:flex;

    align-items:center;

    gap:14px;

    padding:14px 16px;

    border-radius:12px;

    color:var(--edge-nav-text-muted);

    font-size:.92rem;

    font-weight:500;

    transition:all .18s ease;

}


/* ==========================================
   LINK HOVER
========================================== */

.edge-navbar-dropdown-content a:hover{

    background:rgba(0,210,106,.12);

    color:#fff;

    transform:translateX(5px);

}


/* ==========================================
   ICONS
========================================== */

.edge-navbar-dropdown-content
.edge-navbar-icon{

    width:18px;
    height:18px;

    flex-shrink:0;

    stroke:currentColor;

}


/* ==========================================
   LOCKED LINK
========================================== */

.edge-navbar-locked-link{

    justify-content:flex-start;

}


/* ==========================================
   LOCK ICON
========================================== */

.edge-navbar-lock-icon{

/* ==========================================

========================================== */

.edge-navbar-dropdown-content a+a{

}

/* =====================================================
   HAMBURGER
===================================================== */

.edge-navbar-toggle{

// =========================
// 🔄 NAV LOGIN / LOGOUT
// =========================
async function setupAuthButton() {

  const btn = document.getElementById("authBtn");
  if (!btn) return;

  const { data: { session } } = await supabaseClient.auth.getSession();

  if (session) {
    btn.innerText = "Logout";

    btn.onclick = async (e) => {
      e.preventDefault();
      await supabaseClient.auth.signOut();
      window.location.href = "login.html";
    };

  } else {
    btn.innerText = "Login";
    btn.href = "login.html";
  }
}

// =========================
// 🔁 AUTH STATE LISTENER
// =========================
supabaseClient.auth.onAuthStateChange(() => {
  setupAuthButton();
});

</script>

<script>
window.addEventListener("load", async () => {
  await setupAuthButton();
});

  if (!toggle || !nav) {
    console.log("❌ Nav elements missing");
    return;
  }

  toggle.addEventListener("click", () => {
    nav.classList.toggle("active");
  });

  document.querySelectorAll("#navLinks a").forEach(link => {
    link.addEventListener("click", () => {
      nav.classList.remove("active");
    });
  });

});
</script>
<script>
document.addEventListener("DOMContentLoaded", async () => {

  const { data: { session } } = await supabaseClient.auth.getSession();

  // If no session → keep locked state
  if (!session || !session.user) return;

  // Get profile
  const { data: profile } = await supabaseClient
    .from("profiles")
    .select("is_active")
    .eq("id", session.user.id)
    .single();

  // If NOT active → keep locked
  if (!profile || profile.is_active !== true) return;

  // ✅ USER IS ACTIVE → UNLOCK NAV

  document.querySelectorAll(".locked-link").forEach(link => {

    // remove lock icon
    const icon = link.querySelector(".lock-icon");
    if (icon) icon.remove();

    // remove locked behaviour
    link.classList.remove("locked-link");

  });

});
</script>
<script>
document.addEventListener("DOMContentLoaded", () => {

  document.querySelectorAll(".locked-link").forEach(link => {
    link.addEventListener("click", function(e) {

      if (this.classList.contains("locked-link")) {
        e.preventDefault();
        window.location.href = "pricing.html";
      }

    });
  });

});
</script>
