<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EdgeBreak Chart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- USE YOUR MAIN SITE CSS -->
  <link rel="stylesheet" href="/styles.css">
</head>

<body>

  <div class="header">
    EdgeBreak Chart — <span class="symbol" id="symbolText">Loading...</span>
  </div>

    <div class="chart-container">
    <div id="tradingview_chart"></div>

    <div id="entryLine" style="display:none;"></div>
    <div id="entryLabel" style="display:none;"></div>

    <div id="stopLine" style="display:none;"></div>
    <div id="stopLabel" style="display:none;"></div>
    <div id="breakoutZone" style="display:none;"></div>
    <div id="riskBox" style="display:none;"></div>
    <div id="rewardBox" style="display:none;"></div>
    <div id="rrLabel" style="display:none;"></div>
  </div>

    
  <div class="footer">
    Data-driven breakout system • Not financial advice
  </div>

  <!-- TradingView -->
  <script src="https://s3.tradingview.com/tv.js"></script>

<script>
// =========================
// URL PARAMS (MISSING BEFORE)
// =========================
const params = new URLSearchParams(window.location.search);

let symbol = params.get("symbol");
const entry = params.get("entry");
const stop = params.get("stop");
const breakout = params.get("breakout");
const target = params.get("target");

if (!symbol) symbol = "AAPL";

// Update header
document.getElementById("symbolText").innerText = symbol;

// =========================
// LOAD CHART (YOU WERE MISSING THIS)
// =========================
new TradingView.widget({
  "width": "100%",
  "height": 600,
  "symbol": "NASDAQ:" + symbol,
  "interval": "D",
  "timezone": "Australia/Sydney",
  "theme": "dark",
  "style": "1",
  "container_id": "tradingview_chart"
});


// =========================
// ENTRY + STOP
// =========================
if (entry) {
  const entryLine = document.getElementById("entryLine");
  const entryLabel = document.getElementById("entryLabel");

  const entryPrice = parseFloat(entry);
  const minPrice = entryPrice * 0.8;
  const maxPrice = entryPrice * 1.2;

  const entryPos = ((maxPrice - entryPrice) / (maxPrice - minPrice)) * 100;

  entryLine.style.display = "block";
  entryLabel.style.display = "block";

  entryLine.style.top = entryPos + "%";
  entryLabel.style.top = (entryPos - 2) + "%";

  entryLabel.innerText = "Entry: $" + entry;

  if (stop) {
    const stopLine = document.getElementById("stopLine");
    const stopLabel = document.getElementById("stopLabel");

    const stopPrice = parseFloat(stop);
    const stopPos = ((maxPrice - stopPrice) / (maxPrice - minPrice)) * 100;

    stopLine.style.display = "block";
    stopLabel.style.display = "block";

    stopLine.style.top = stopPos + "%";
    stopLabel.style.top = (stopPos - 2) + "%";

    stopLabel.innerText = "Stop: $" + stop;
  }

  // =========================
  // BREAKOUT ZONE
  // =========================
  if (breakout) {
    const zone = document.getElementById("breakoutZone");
    const breakoutPrice = parseFloat(breakout);

    const breakoutPos = ((maxPrice - breakoutPrice) / (maxPrice - minPrice)) * 100;

    zone.style.display = "block";
    zone.style.top = (breakoutPos - 2) + "%";
  }

  // =========================
  // RISK / REWARD
  // =========================
  if (stop && target) {
    const riskBox = document.getElementById("riskBox");
    const rewardBox = document.getElementById("rewardBox");
    const rrLabel = document.getElementById("rrLabel");

    const stopPrice = parseFloat(stop);
    const targetPrice = parseFloat(target);

    const stopPos = ((maxPrice - stopPrice) / (maxPrice - minPrice)) * 100;
    const targetPos = ((maxPrice - targetPrice) / (maxPrice - minPrice)) * 100;

    riskBox.style.display = "block";
    rewardBox.style.display = "block";
    rrLabel.style.display = "block";

    riskBox.style.top = entryPos + "%";
    riskBox.style.height = (stopPos - entryPos) + "%";

    rewardBox.style.top = targetPos + "%";
    rewardBox.style.height = (entryPos - targetPos) + "%";

    const risk = Math.abs(entryPrice - stopPrice);
    const reward = Math.abs(targetPrice - entryPrice);
    const rr = (reward / risk).toFixed(2);

    rrLabel.style.top = (entryPos - 3) + "%";
    rrLabel.innerText = "R:R " + rr + "x";
  }
}
</script>

</body>
</html>
