<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Results — EdgeBreak</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0f14;
  color: #e6edf3;
}

.nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  border-bottom: 1px solid #1f2933;
}

.logo { font-weight: bold; }

.nav-links a {
  margin-left: 25px;
  color: #9ca3af;
  text-decoration: none;
}

.nav-links a:hover { color: #fff; }

.container {
  max-width: 900px;
  margin: auto;
  padding: 40px 20px;
}

h1 {
  font-size: 32px;
  margin-bottom: 10px;
}

p {
  color: #9ca3af;
}

/* FILTER BUTTONS */
.filters {
  margin-top: 20px;
  margin-bottom: 20px;
}

.filters button {
  margin-right: 10px;
  padding: 8px 14px;
  border: 1px solid #1f2933;
  background: #111827;
  color: #9ca3af;
  border-radius: 6px;
  cursor: pointer;
}

.filters button:hover {
  color: #fff;
  border-color: #22c55e;
}

/* RESULTS */
.result {
  background: #111827;
  border: 1px solid #1f2933;
  padding: 20px;
  border-radius: 10px;
  margin-top: 20px;
}

.symbol {
  font-size: 20px;
  font-weight: bold;
}

.grade {
  font-size: 13px;
  color: #9ca3af;
  margin-top: 5px;
}

.move {
  margin-top: 10px;
  font-weight: bold;
  font-size: 18px;
}

.up { color: #22c55e; }
.down { color: #ef4444; }

.structure {
  margin-top: 10px;
  font-size: 13px;
  color: #9ca3af;
}

/* CTA */
.cta {
  margin-top: 60px;
  text-align: center;
}

.btn {
  padding: 12px 20px;
  background: #22c55e;
  color: black;
  border-radius: 6px;
  font-weight: bold;
  text-decoration: none;
}

/* FOOTER */
.footer {
  margin-top: 60px;
  text-align: center;
  font-size: 12px;
  color: #6e7681;
}
</style>
</head>

<body>

<div class="nav">
  <div class="logo">EdgeBreak</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="watchlist.html">Watchlist</a>
    <a href="results.html">Results</a>
    <a href="how-it-works.html">How It Works</a>
    <a href="pricing.html">Pricing</a>
    <a href="faq.html">FAQ</a>
  </div>
</div>

<div class="container">

<h1>Trade Results</h1>

<p>
Real completed trades tracked by the EdgeBreak system.
</p>

<!-- 🔥 FILTER BUTTONS -->
<div class="filters">
  <button onclick="filterMarket('ALL')">ALL</button>
  <button onclick="filterMarket('GREEN')" style="color:#22c55e;">🟢 GREEN</button>
  <button onclick="filterMarket('YELLOW')" style="color:#facc15;">🟡 YELLOW</button>
  <button onclick="filterMarket('RED')" style="color:#ef4444;">🔴 RED</button>
</div>

<!-- RESULTS CONTAINER -->
<div id="resultsContainer"></div>

<div class="cta">
  <h2>Access High-Quality Breakouts</h2>
  <a href="pricing.html" class="btn">Upgrade Now</a>
</div>

<div class="footer">
© 2026 EdgeBreak — Breakout Intelligence Platform
</div>

</div>

<script>

let allTrades = [];

// LOAD DATA
fetch("./trade_history.json?v=" + new Date().getTime())
.then(res => res.json())
.then(data => {
  allTrades = data;
  renderResults(data);
});

// RENDER FUNCTION
function renderResults(data){

  const container = document.getElementById("resultsContainer");
  container.innerHTML = "";

  if(!data || data.length === 0){
    container.innerHTML = "<p>No trades found</p>";
    return;
  }

  data.forEach(trade => {

    const moveClass = trade.percent_move >= 0 ? "up" : "down";

    const div = document.createElement("div");
    div.className = "result";

    div.innerHTML = `
      <div class="symbol">${trade.ticker}</div>
      <div class="grade">Grade: ${trade.grade} | ${trade.market}</div>
      <div class="move ${moveClass}">
        ${trade.percent_move >= 0 ? "+" : ""}${trade.percent_move.toFixed(2)}%
      </div>
      <div class="structure">
        ${trade.result}
      </div>
    `;

    container.appendChild(div);

  });
}

// FILTER FUNCTION
function filterMarket(type){

  if(type === "ALL"){
    renderResults(allTrades);
    return;
  }

  const filtered = allTrades.filter(t => t.market === type);

  renderResults(filtered);

}

</script>

</body>
</html>
