<script defer>

// =========================
// CREATE ACCOUNT
// =========================

const supabaseClient = window.supabaseClient;

async function handleSignup() {

    const fullName =
        document.getElementById("fullName").value.trim();

    const email =
        document.getElementById("email").value.trim();

    const password =
        document.getElementById("password").value;

    const confirmPassword =
        document.getElementById("confirmPassword").value;

    const errorBox =
        document.getElementById("error");

    const btn =
        document.getElementById("actionBtn");

    errorBox.innerText = "";

    if (!fullName || !email || !password || !confirmPassword) {

        errorBox.innerText =
            "Please complete all fields.";

        return;

    }

    if (password !== confirmPassword) {

        errorBox.innerText =
            "Passwords do not match.";

        return;

    }

    if (password.length < 8) {

        errorBox.innerText =
            "Password must be at least 8 characters.";

        return;

    }

    btn.disabled = true;
    btn.innerText = "Creating Account...";

    // =========================
    // CREATE ACCOUNT
    // =========================

    const {

        data: signupData,
        error

    } = await supabaseClient.auth.signUp({

        email,

        password,

        options: {

            data: {

                full_name: fullName

            }

        }

    });

    console.log("SIGNUP:", signupData);
    console.log("SIGNUP ERROR:", error);

    if (error) {

        errorBox.innerText = error.message;

        btn.disabled = false;
        btn.innerText = "Create Account";

        return;

    }

    // =========================
    // WAIT FOR SESSION
    // =========================

    let session = null;

    for (let i = 0; i < 10; i++) {

        const {

            data

        } = await supabaseClient.auth.getSession();

        session = data.session;

        if (session) break;

        await new Promise(resolve => setTimeout(resolve, 500));

    }

    console.log("SESSION:", session);

    if (!session) {

        errorBox.innerText =
            "Unable to create login session.";

        btn.disabled = false;
        btn.innerText = "Create Account";

        return;

    }

    // =========================
    // ACTIVATE ACCOUNT
    // =========================

    console.log("Calling activate-account...");

    const activateResponse =
        await fetch(
            "https://qmonyhukamuuunxxxdlk.supabase.co/functions/v1/activate-account",
            {

                method: "POST",

                headers: {

                    "Authorization":
                        `Bearer ${session.access_token}`,

                    "Content-Type":
                        "application/json"

                }

            }
        );

    const activateResult =
        await activateResponse.json();

    console.log("ACTIVATE RESULT:", activateResult);

    if (!activateResult.success) {

        errorBox.innerText =
            activateResult.error ||
            "Unable to activate subscription.";

        btn.disabled = false;
        btn.innerText = "Create Account";

        return;

    }

    // =========================
    // SUCCESS
    // =========================

    window.location.href =
        "/nasdaq-stock-scanner.html";

}

// =========================
// EVENTS
// =========================

document.addEventListener("DOMContentLoaded", () => {

    document
        .getElementById("actionBtn")
        .addEventListener("click", handleSignup);

    document.addEventListener("keydown", e => {

        if (e.key === "Enter") {

            handleSignup();

        }

    });

});

</script>
