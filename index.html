<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EDGEBREAK</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    h1, h2, h3 {
      margin: 0;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 80px 20px;
      background: linear-gradient(to right, #020617, #0f172a);
    }

    .hero h1 {
      font-size: 48px;
      font-weight: bold;
    }

    .hero p {
      margin-top: 10px;
      color: #94a3b8;
      font-size: 18px;
    }

    .hero button {
      margin-top: 20px;
      padding: 12px 28px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: white;
      cursor: pointer;
    }

    .hero button:hover {
      background: #16a34a;
    }

    /* SECTION */
    .section {
      margin-top: 40px;
    }

    .section h2 {
      margin-bottom: 20px;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
    }

    .big {
      font-size: 22px;
      font-weight: bold;
    }

    .green { color: #22c55e; }
    .red { color: #ef4444; }

    /* GROUP STATS */
    .groups {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    /* BEST TRADES */
    .trade {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1e293b;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    /* WATCHLIST */
    .watch {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      border-bottom: 1px solid #334155;
    }

  </style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>EDGEBREAK</h1>
  <p>Breakout Trading System Built on Real Data</p>
  <p>Live trades • Backtested edge • Updated daily</p>
  <button>Get Access</button>
</div>

<div class="container">

  <!-- STATS -->
  <div class="section">
    <h2>📊 2026 Performance</h2>

    <div id="statsGrid" class="grid"></div>

    <div id="groupStats" class="groups"></div>
  </div>

  <!-- BEST TRADES -->
  <div class="section">
    <h2>🏆 Best Trades (2026)</h2>
    <div id="bestTrades"></div>
  </div>

  <!-- WATCHLIST -->
  <div class="section">
    <h2>📡 Live Watchlist</h2>
    <div id="watchlist"></div>
  </div>

</div>

<script>
fetch("stats.json?v=" + new Date().getTime())
  .then(res => res.json())
  .then(data => {

    const year = "2026";
    const stats = data.years[year];

    // =========================
    // MAIN STATS
    // =========================
    const statsGrid = document.getElementById("statsGrid");

    statsGrid.innerHTML = `
      <div class="card"><div>Total Trades</div><div class="big">${stats.total_trades}</div></div>
      <div class="card"><div>Win Rate</div><div class="big">${stats.win_rate}%</div></div>
      <div class="card"><div>Avg Return</div><div class="big">${stats.avg_return}%</div></div>
      <div class="card"><div>Best Trade</div><div class="big green">${stats.best_trade}%</div></div>
      <div class="card"><div>Worst Trade</div><div class="big red">${stats.worst_trade}%</div></div>
    `;

    // =========================
    // GROUP STATS
    // =========================
    const groupDiv = document.getElementById("groupStats");

    groupDiv.innerHTML = Object.entries(stats.groups).map(([group, g]) => `
      <div class="card">
        <h3>${group}</h3>
        <div>Trades: ${g.trades}</div>
        <div>Win Rate: ${g.win_rate}%</div>
        <div>Avg: ${g.avg_return}%</div>
        <div class="green">Best: ${g.best}%</div>
        <div class="red">Worst: ${g.worst}%</div>
      </div>
    `).join("");

    // =========================
    // BEST TRADES (TOP 5)
    // =========================
    const bestDiv = document.getElementById("bestTrades");

    const topTrades = stats.best_trades.slice(0, 5);

    bestDiv.innerHTML = topTrades.map(t => `
      <div class="trade">
        <div><strong>${t.symbol}</strong></div>
        <div class="green">+${t.return}%</div>
      </div>
    `).join("");

  });


// =========================
// WATCHLIST
// =========================
fetch("watchlist.json?v=" + new Date().getTime())
  .then(res => res.json())
  .then(data => {

    const watchDiv = document.getElementById("watchlist");

    watchDiv.innerHTML = data.map(t => {

      const color = t.current_return >= 0 ? "green" : "red";

      return `
        <div class="watch">
          <div>${t.symbol}</div>
          <div>$${t.entry}</div>
          <div class="${color}">${t.current_return}%</div>
        </div>
      `;

    }).join("");

  });
</script>

</body>
</html>
