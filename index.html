<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EDGEBREAK</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #020617;
  color: #e2e8f0;
}

/* HERO */
.hero {
  position: relative;
  height: 90vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  background: url('images/hero-bg.png') center/cover no-repeat;
}

.hero-overlay {
  position: absolute;
  inset: 0;
  background: rgba(2,6,23,0.7);
}

.logo {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 160px;
  z-index: 3;
}

.hero-content {
  position: relative;
  z-index: 2;
}

.hero h1 {
  font-size: 56px;
  margin-bottom: 10px;
}

.hero p {
  color: #94a3b8;
  margin: 5px 0;
}

.hero button {
  margin-top: 20px;
  padding: 14px 32px;
  background: #22c55e;
  border: none;
  border-radius: 10px;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.hero button:hover {
  background: #16a34a;
}

/* CONTAINER */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

/* SECTION */
.section {
  margin-top: 60px;
}

.section h2 {
  margin-bottom: 20px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 15px;
}

.card {
  background: #0f172a;
  padding: 16px;
  border-radius: 12px;
  border: 1px solid #1e293b;
}

.big {
  font-size: 22px;
  font-weight: bold;
}

.green { color: #22c55e; }
.red { color: #ef4444; }

/* GROUP STATS */
.groups {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 15px;
  margin-top: 20px;
}

/* BEST TRADES */
.trade {
  display: flex;
  justify-content: space-between;
  padding: 14px;
  background: #0f172a;
  border-radius: 10px;
  margin-bottom: 10px;
  border: 1px solid #1e293b;
}

/* WATCHLIST */
.watch {
  display: flex;
  justify-content: space-between;
  padding: 14px;
  border-bottom: 1px solid #1e293b;
}

/* FOOTER */
.footer {
  margin-top: 80px;
  padding: 30px;
  text-align: center;
  border-top: 1px solid #1e293b;
  color: #64748b;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-overlay"></div>

  <img src="images/logo.png" class="logo">

  <div class="hero-content">
    <h1>EDGEBREAK</h1>
    <p>Breakout Trading System Built on Real Data</p>
    <p>Live trades • Backtested edge • Updated daily</p>
    <button>Get Access</button>
  </div>
</div>

<div class="container">

  <!-- STATS -->
  <div class="section">
    <h2>📊 2026 Performance</h2>

    <div id="statsGrid" class="grid"></div>
    <div id="groupStats" class="groups"></div>
  </div>

  <!-- BEST TRADES -->
  <div class="section">
    <h2>🏆 Best Trades (2026)</h2>
    <div id="bestTrades"></div>
  </div>

  <!-- WATCHLIST -->
  <div class="section">
    <h2>📡 Live Watchlist</h2>
    <div id="watchlist"></div>
  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  <div>EDGEBREAK © 2026</div>
  <div>Data-driven breakout trading system</div>
</div>

<script>
// =========================
// LOAD STATS
// =========================
fetch("stats.json?v=" + new Date().getTime())
  .then(res => res.json())
  .then(data => {

    const year = "2026";
    const stats = data.years[year];

    // MAIN STATS
    document.getElementById("statsGrid").innerHTML = `
      <div class="card"><div>Total Trades</div><div class="big">${stats.total_trades}</div></div>
      <div class="card"><div>Win Rate</div><div class="big">${stats.win_rate}%</div></div>
      <div class="card"><div>Avg Return</div><div class="big">${stats.avg_return}%</div></div>
      <div class="card"><div>Best Trade</div><div class="big green">${stats.best_trade}%</div></div>
      <div class="card"><div>Worst Trade</div><div class="big red">${stats.worst_trade}%</div></div>
    `;

    // GROUP STATS
    document.getElementById("groupStats").innerHTML =
      Object.entries(stats.groups).map(([group, g]) => `
        <div class="card">
          <h3>${group}</h3>
          <div>Trades: ${g.trades}</div>
          <div>Win Rate: ${g.win_rate}%</div>
          <div>Avg: ${g.avg_return}%</div>
          <div class="green">Best: ${g.best}%</div>
          <div class="red">Worst: ${g.worst}%</div>
        </div>
      `).join("");

    // BEST TRADES (TOP 5)
    const topTrades = stats.best_trades.slice(0, 5);

    document.getElementById("bestTrades").innerHTML =
      topTrades.map(t => `
        <div class="trade">
          <div><strong>${t.symbol}</strong></div>
          <div class="green">+${t.return}%</div>
        </div>
      `).join("");

  });


// =========================
// WATCHLIST
// =========================
fetch("watchlist.json?v=" + new Date().getTime())
  .then(res => res.json())
  .then(data => {

    document.getElementById("watchlist").innerHTML =
      data.map(t => {
        const color = t.current_return >= 0 ? "green" : "red";

        return `
          <div class="watch">
            <div>${t.symbol}</div>
            <div>$${t.entry}</div>
            <div class="${color}">${t.current_return}%</div>
          </div>
        `;
      }).join("");

  });
</script>

</body>
</html>
