<script defer>

// =========================
// 🔑 LOGIN
// =========================
const supabaseClient = window.supabaseClient;

async function handleAuth() {

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const errorBox = document.getElementById("error");

  if (!email || !password) {
    errorBox.innerText = "Enter email and password";
    return;
  }

  const btn = document.getElementById("actionBtn");

  btn.disabled = true;
  btn.innerText = "Logging in...";

  const { error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    errorBox.innerText = error.message;
    btn.disabled = false;
    btn.innerText = "Login";
    return;
  }

  // ✅ SUCCESS → DASHBOARD
  window.location.href = "/nasdaq-stock-scanner.html";
}

    
// =========================
// 🔐 FORGOT PASSWORD (SUPABASE RESET)
// =========================
document.getElementById("forgotPassword").addEventListener("click", async (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value.trim();

  if (!email) {
    alert("Enter your email first");
    return;
  }

  const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
    redirectTo: "https://www.edgebreak.ai/reset-password.html"
  });

  if (error) {
    alert(error.message);
  } else {
    alert("Password reset email sent");
  }
});

// =========================
// EVENTS (FIXED)
// =========================
document.addEventListener("DOMContentLoaded", () => {

  const btn = document.getElementById("actionBtn");

  if (!btn) {
    console.error("Login button not found");
    return;
  }

  btn.addEventListener("click", handleAuth);

  document.addEventListener("keydown", (e) => {
    if (e.key === "Enter") handleAuth();
  });

});




document.addEventListener("DOMContentLoaded", () => {
  const params = new URLSearchParams(window.location.search);

  if (params.get("success") === "true") {
    const msg = document.createElement("p");
    msg.innerText = "Payment successful. Log in to access your account.";
    msg.style.color = "#22c55e";
    msg.style.marginTop = "10px";
    msg.style.textAlign = "center";
    msg.style.fontWeight = "600";

    const container = document.querySelector(".container") || document.body;
    container.prepend(msg);
  }
});
</script>
