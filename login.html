<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | EdgeBreak</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>

<div class="container">

  <div class="section" style="max-width:400px; margin:100px auto;">

    <h2 style="text-align:center; margin-bottom:20px;">
      EdgeBreak Login
    </h2>

    <input id="email" type="text" placeholder="Email"
      style="width:100%; padding:10px; margin-bottom:10px; border-radius:6px; border:none;">

    <input id="password" type="password" placeholder="Password"
      style="width:100%; padding:10px; margin-bottom:20px; border-radius:6px; border:none;">

    <button onclick="login()" class="nav-cta" style="width:100%;">
      Login
    </button>

    <div id="error" style="color:#ef4444; margin-top:10px; text-align:center;"></div>

  </div>

</div>

<script>
// =========================
// 🔐 LOGIN FUNCTION
// =========================
function login() {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (email === "admin" && password === "admin") {

    localStorage.setItem("edgebreak_access", "true");

    window.location.href = "watchlist.html";

  } else {
    document.getElementById("error").innerText = "Invalid login";
  }
}

// ENTER KEY SUPPORT
document.addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    login();
  }
});
</script>

</body>
</html>
