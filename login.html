<!DOCTYPE html>
<html>
<head>
  <title>Login | EdgeBreak</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="background:#020617; color:white; display:flex; align-items:center; justify-content:center; height:100vh;">

  <div style="text-align:center; max-width:300px; width:100%;">
    
    <h2 style="margin-bottom:20px;">Login</h2>

    <input id="email" type="text" placeholder="Email"
      style="width:100%; padding:10px; margin-bottom:10px; border-radius:6px; border:none;">

    <input id="password" type="password" placeholder="Password"
      style="width:100%; padding:10px; margin-bottom:20px; border-radius:6px; border:none;">

    <button onclick="login()"
      style="width:100%; padding:10px; background:#22c55e; border:none; border-radius:6px; color:white;">
      Login
    </button>

    <p id="error" style="color:#ef4444; margin-top:10px;"></p>

  </div>

<script>
function login() {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  // SIMPLE TEST LOGIN (CHANGE LATER)
  if (email === "admin" && password === "admin") {

    localStorage.setItem("edgebreak_access", "true");

    window.location.href = "watchlist.html";

  } else {
    document.getElementById("error").innerText = "Invalid login";
  }
}
</script>

</body>
</html>
