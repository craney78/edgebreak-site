<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - EdgeBreak</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #020617;
  color: #e2e8f0;
}

/* LOGO BAR */
.logo-bar {
  text-align: center;
  padding: 20px 0;
  border-bottom: 1px solid #1e293b;
}

.logo-bar img {
  width: 120px;
  cursor: pointer;
}

/* CENTER CONTENT */
.wrapper {
  display: flex;
  justify-content: center;
  align-items: center;
  height: calc(100vh - 80px);
}

/* CARD */
.login-card {
  background: #0f172a;
  padding: 40px;
  border-radius: 12px;
  border: 1px solid #1e293b;
  width: 320px;
  text-align: center;
}

/* INPUTS */
input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #1e293b;
  background: #020617;
  color: white;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  background: #22c55e;
  border: none;
  border-radius: 8px;
  color: white;
  cursor: pointer;
  font-size: 16px;
}

/* TEXT */
p {
  color: #94a3b8;
  font-size: 14px;
}

.error {
  color: #ef4444;
  font-size: 13px;
  margin-top: 10px;
}
</style>
</head>

<body>

<!-- LOGO BAR -->
<div class="logo-bar">
  <img src="images/logo.png" onclick="window.location.href='index.html'">
</div>

<!-- LOGIN -->
<div class="wrapper">
  <div class="login-card">

    <h2>Login</h2>
    <p>Access your EdgeBreak dashboard</p>

    <input type="text" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <div id="error" class="error"></div>

  </div>
</div>

<script>
function login() {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  // TEMP LOGIN
  if (email === "test@test.com" && password === "1234") {
    
    localStorage.setItem("loggedIn", "true");
    window.location.href = "index.html";

  } else {
    document.getElementById("error").innerText = "Invalid login details";
  }

}
</script>

</body>
</html>
