<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | EdgeBreak</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/dashboard.css">

  <!-- SUPABASE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- 🔑 CONFIG -->
  <script>
    window.SUPABASE_URL = "https://qmonyhukamuuunxxxdlk.supabase.co";
    window.SUPABASE_KEY = "PASTE_YOUR_ANON_PUBLIC_KEY_HERE";
  </script>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="nav-inner">
    <div class="nav-left">
      <a href="index.html">
        <img src="images/logo.png" class="nav-logo">
      </a>
      <a href="index.html" class="logo-text">EDGEBREAK</a>
    </div>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="pricing.html" class="nav-link">Pricing</a>
      <a href="#" class="nav-cta" id="authBtn">Login</a>
    </div>
  </div>
</div>

<!-- FORM -->
<div class="container">
  <div class="section" style="max-width:400px; margin:100px auto;">

    <h2 id="formTitle" style="text-align:center;">EdgeBreak Login</h2>

    <input id="email" type="email" placeholder="Email"
      style="width:100%; padding:10px; margin:10px 0;">

    <input id="password" type="password" placeholder="Password"
      style="width:100%; padding:10px; margin-bottom:20px;">

    <button id="actionBtn" class="nav-cta" style="width:100%;">
      Login
    </button>

    <p style="text-align:center; margin-top:15px;">
      <span id="toggleMode" style="cursor:pointer; color:#22c55e;">
        Don’t have an account? Create one
      </span>
    </p>

    <div id="error" style="color:red; text-align:center;"></div>

  </div>
</div>

<script>

// =========================
// 🔑 INIT SUPABASE
// =========================
const supabaseClient = supabase.createClient(
  window.SUPABASE_URL,
  window.SUPABASE_KEY
);

// =========================
// 🔁 MODE
// =========================
let isSignup = false;

const btn = document.getElementById("actionBtn");
const toggle = document.getElementById("toggleMode");
const title = document.getElementById("formTitle");

// =========================
// 🔁 TOGGLE LOGIN/SIGNUP
// =========================
toggle.addEventListener("click", () => {

  isSignup = !isSignup;

  if (isSignup) {
    title.innerText = "Create Account";
    btn.innerText = "Create Account";
    toggle.innerText = "Already have an account? Login";
  } else {
    title.innerText = "EdgeBreak Login";
    btn.innerText = "Login";
    toggle.innerText = "Don’t have an account? Create one";
  }

});

// =========================
// 🚀 MAIN AUTH
// =========================
async function handleAuth() {

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  btn.disabled = true;
  btn.innerText = isSignup ? "Creating..." : "Logging in...";

  // =========================
  // SIGNUP
  // =========================
  if (isSignup) {

    const { data, error } = await supabaseClient.auth.signUp({
      email,
      password
    });

    if (error) {
      document.getElementById("error").innerText = error.message;
      btn.disabled = false;
      btn.innerText = "Create Account";
      return;
    }

    const user = data.user;

    // create profile
    await supabaseClient.from("profiles").insert({
      id: user.id,
      is_active: false
    });

    alert("Account created. You can now log in.");

    isSignup = false;
    title.innerText = "EdgeBreak Login";
    btn.innerText = "Login";
    toggle.innerText = "Don’t have an account? Create one";

    btn.disabled = false;
    return;
  }

  // =========================
  // LOGIN
  // =========================
  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    document.getElementById("error").innerText = error.message;
    btn.disabled = false;
    btn.innerText = "Login";
    return;
  }

  // ✅ LOGIN SUCCESS → ALWAYS GO TO DASHBOARD
  window.location.href = "dashboard.html";

}

// =========================
// EVENTS
// =========================
btn.addEventListener("click", handleAuth);

document.addEventListener("keydown", (e) => {
  if (e.key === "Enter") handleAuth();
});

// =========================
// NAV BUTTON
// =========================
async function setupAuthButton() {

  const btn = document.getElementById("authBtn");

  const { data: { session } } = await supabaseClient.auth.getSession();

  if (session && session.user) {
    btn.innerText = "Logout";
    btn.onclick = async () => {
      await supabaseClient.auth.signOut();
      window.location.href = "login.html";
    };
  } else {
    btn.innerText = "Login";
    btn.href = "login.html";
  }
}

setupAuthButton();

</script>

</body>
</html>
