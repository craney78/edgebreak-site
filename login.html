<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | EdgeBreak</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/dashboard.css">

  <!-- ✅ SUPABASE CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<!-- NAVBAR -->
<div class="nav">
  <div class="nav-inner">

    <div class="nav-left">
      <a href="index.html">
        <img src="images/logo.png" class="nav-logo">
      </a>
      <a href="index.html" class="logo-text">EDGEBREAK</a>
      <span class="live-badge">LIVE</span>
    </div>

    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="index.html#statsGrid" class="nav-link">Performance</a>
      <a href="watchlist.html" class="nav-link">Trading Desk</a>
      <a href="trading-guide.html" class="nav-link">Guide</a>
      <a href="dashboard.html" class="nav-link">My Dashboard</a>
      <a href="/chart.html?symbol=AAPL" class="nav-link">Charts</a>
      <a href="blog.html" class="nav-link">Trade Insights</a>
      <a href="#" class="nav-cta" id="authBtn">Login</a>
    </div>

  </div>
</div>

<!-- LOGIN BOX -->
<div class="container">
  <div class="section" style="max-width:400px; margin:100px auto;">

    <h2 style="text-align:center; margin-bottom:20px;">
      EdgeBreak Login
    </h2>

    <input id="email" type="email" placeholder="Email"
      style="width:100%; padding:10px; margin-bottom:10px; border-radius:6px; border:none;" />

    <input id="password" type="password" placeholder="Password"
      style="width:100%; padding:10px; margin-bottom:20px; border-radius:6px; border:none;" />

    <button id="loginBtn" class="nav-cta" style="width:100%;">
      Login
    </button>

    <div id="error" style="color:#ef4444; margin-top:10px; text-align:center;"></div>

  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  <div class="footer-inner">
    <div class="footer-col">
      <h3>EdgeBreak</h3>
      <p>Data-driven breakout trading system</p>
    </div>
  </div>
</div>

<script>

// =========================
// 🔑 SUPABASE CLIENT (CLEAN)
// =========================
const supabaseClient = supabase.createClient(
  "https://qmonyhukamuuunxxxdlk.supabase.co",
  "sb_publishable_WsyyDmOBFu7HiopALD_mJw_h05DKlw-"
);

// =========================
// 🔐 LOGIN FUNCTION
// =========================
async function login() {

  const btn = document.getElementById("loginBtn");
  btn.disabled = true;
  btn.innerText = "Logging in...";

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    document.getElementById("error").innerText = error.message;
    btn.disabled = false;
    btn.innerText = "Login";
    return;
  }

  const user = data.user;

  // 🔍 Get profile
  const { data: profile, error: profileError } = await supabaseClient
    .from("profiles")
    .select("is_active")
    .eq("id", user.id)
    .single();

  if (profileError) {
    document.getElementById("error").innerText = "Error loading profile";
    btn.disabled = false;
    btn.innerText = "Login";
    return;
  }

  // 🚫 Not active → pricing
  if (!profile || !profile.is_active) {
    window.location.href = "pricing.html";
    return;
  }

  // ✅ SUCCESS
  window.location.href = "watchlist.html";
}

// =========================
// ⌨️ ENTER KEY SUPPORT
// =========================
document.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    login();
  }
});

// =========================
// 🔘 BUTTON CLICK
// =========================
document.getElementById("loginBtn").addEventListener("click", login);

// =========================
// 🔄 NAV LOGIN / LOGOUT
// =========================
async function setupAuthButton() {

  const btn = document.getElementById("authBtn");
  if (!btn) return;

  const { data: { session } } = await supabaseClient.auth.getSession();

  if (session) {
    btn.innerText = "Logout";

    btn.onclick = async (e) => {
      e.preventDefault();
      await supabaseClient.auth.signOut();
      window.location.href = "login.html";
    };

  } else {
    btn.innerText = "Login";
    btn.href = "login.html";
  }
}

setupAuthButton();

supabaseClient.auth.onAuthStateChange(() => {
  setupAuthButton();
});

</script>

</body>
</html>
