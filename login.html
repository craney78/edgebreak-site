<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | EdgeBreak</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/dashboard.css">

  <!-- SUPABASE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- CONFIG -->
  <script>
    window.SUPABASE_URL = "https://qmonyhukamuuunxxxdlk.supabase.co";
    window.SUPABASE_KEY = "sb_publishable_WsyyDmOBFu7HiopALD_mJw_h05DKlw-";
  </script>
</head>

<body>

<!-- NAVBAR -->
<div class="nav">
  <div class="nav-inner">

    <!-- LEFT -->
    <div class="nav-left">
      <a href="index.html">
        <img src="images/logo.png" class="nav-logo">
      </a>
      <a href="index.html" class="logo-text">EDGEBREAK</a>
      <span class="live-badge">LIVE</span>
    </div>

    <!-- DESKTOP LINKS -->
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="index.html#statsGrid" class="nav-link">Performance</a>
      <a href="watchlist.html" class="nav-link">Trading Desk</a>
      <a href="trading-guide.html" class="nav-link">Guide</a>
      <a href="dashboard.html" class="nav-link">My Dashboard</a>
      <a href="/chart.html?symbol=AAPL" class="nav-link">Charts</a>
      <a href="blog.html" class="nav-link">Trade Insights</a>
      <a href="#" class="nav-cta" id="authBtn">Login</a>
    </div>

  </div>

</div>  

<!-- FORM -->
<div class="container">

  <div class="section login-box">

    <!-- LOGO -->
  <div class="hero-logo-wrap">
    <img src="images/logo.png" class="hero-logo" width="90">
  </div>

    <!-- HEADLINE -->
    <h2 id="formTitle" class="login-title">
      Access EdgeBreak
    </h2>

    <!-- SUBTEXT -->
    <p class="login-subtext">
      Create an account to access live breakout trades, performance tracking, and your dashboard.
    </p>

    <!-- INPUTS -->
    <input id="email" type="email" placeholder="Email" class="input-field">
    <input id="password" type="password" placeholder="Password" class="input-field">

    <!-- BUTTON -->
    <button id="actionBtn" class="nav-cta full-width">
      Login
    </button>

    <!-- TOGGLE -->
    <p class="login-toggle">
      <span id="toggleMode" class="link-green">
        Don’t have an account? Create one
      </span>
    </p>

    <!-- ERROR -->
    <div id="error" class="error-text"></div>

  </div>

</div>

</div>

<script>

// =========================
// 🔑 INIT SUPABASE
// =========================
const supabaseClient = supabase.createClient(
  window.SUPABASE_URL,
  window.SUPABASE_KEY
);

// =========================
// 💳 STRIPE LINK (PUT YOUR REAL LINK HERE)
// =========================
const STRIPE_LINK = "https://buy.stripe.com/test_cNicN45d74hvai46g5ds401";

// =========================
// 🔁 MODE
// =========================
let isSignup = false;

const btn = document.getElementById("actionBtn");
const toggle = document.getElementById("toggleMode");
const title = document.getElementById("formTitle");

// =========================
// 🔁 TOGGLE LOGIN/SIGNUP
// =========================
toggle.addEventListener("click", () => {

  isSignup = !isSignup;

  if (isSignup) {
    title.innerText = "Create Account";
    btn.innerText = "Create Account";
    toggle.innerText = "Already have an account? Login";
  } else {
    title.innerText = "EdgeBreak Login";
    btn.innerText = "Login";
    toggle.innerText = "Don’t have an account? Create one";
  }

});

// =========================
// 🚀 MAIN AUTH
// =========================
async function handleAuth() {

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  btn.disabled = true;
  btn.innerText = isSignup ? "Creating..." : "Logging in...";

  // =========================
  // SIGNUP
  // =========================
  if (isSignup) {

    const { data, error } = await supabaseClient.auth.signUp({
      email,
      password
    });

    if (error) {
      document.getElementById("error").innerText = error.message;
      btn.disabled = false;
      btn.innerText = "Create Account";
      return;
    }

    const user = data.user;

    // CREATE PROFILE
    await supabaseClient.from("profiles").insert({
      id: user.id,
      is_active: false
    });

    // 👉 SEND TO STRIPE
    window.location.href = STRIPE_LINK;

    return;
  }

  // =========================
  // LOGIN
  // =========================
  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    document.getElementById("error").innerText = error.message;
    btn.disabled = false;
    btn.innerText = "Login";
    return;
  }

  // 👉 SUCCESS → DASHBOARD
  window.location.href = "dashboard.html";

}

// =========================
// EVENTS
// =========================
btn.addEventListener("click", handleAuth);

document.addEventListener("keydown", (e) => {
  if (e.key === "Enter") handleAuth();
});

// =========================
// NAV LOGIN / LOGOUT
// =========================
async function setupAuthButton() {

  const btn = document.getElementById("authBtn");

  const { data: { session } } = await supabaseClient.auth.getSession();

  if (session && session.user) {
    btn.innerText = "Logout";
    btn.onclick = async () => {
      await supabaseClient.auth.signOut();
      window.location.href = "login.html";
    };
  } else {
    btn.innerText = "Login";
    btn.href = "login.html";
  }
}

setupAuthButton();

supabaseClient.auth.onAuthStateChange(setupAuthButton);

</script>

</body>
</html>
