<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Dashboard - EdgeBreak</title>

<link rel="stylesheet" href="dashboard.css">

</head>

<style>
/* =========================
   BASE
========================= */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: #e2e8f0;
  background: #020617;
  padding: 80px 20px;
}

.container {
  max-width: 1100px;
  margin: auto;
}

/* =========================
   NAVBAR
========================= */
.nav {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(2,6,23,0.9);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(30,41,59,0.6);
  z-index: 1000;
}

.nav-inner {
  max-width: 1100px;
  margin: auto;
  padding: 14px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.nav-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.nav-logo {
  width: 30px;
}

.logo-text {
  color: white;
  text-decoration: none;
  font-weight: bold;
}

.nav-links {
  display: flex;
  gap: 20px;
  align-items: center;
}

.nav-link {
  color: #94a3b8;
  text-decoration: none;
  font-size: 14px;
}

.nav-link:hover {
  color: #22c55e;
}

.nav-cta {
  background: linear-gradient(90deg, #22c55e, #16a34a);
  border: none;
  padding: 8px 16px;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}

/* =========================
   HEADER
========================= */
.header {
  margin-top: 20px;
  margin-bottom: 30px;
}

/* =========================
   SECTIONS
========================= */
.section {
  margin-top: 40px;
}

/* =========================
   GRID (REUSE YOUR STYLE)
========================= */
.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
}

.stat {
  background: #0f172a;
  border: 1px solid #1e293b;
  border-radius: 14px;
  padding: 20px;
  text-align: center;
}

/* LABEL + VALUE */
.label {
  font-size: 12px;
  color: #64748b;
  margin-bottom: 8px;
}

.value {
  font-size: 24px;
  font-weight: bold;
}

/* =========================
   INPUTS
========================= */
input, select {
  width: 100%;
  padding: 8px;
  border-radius: 6px;
  border: none;
  outline: none;
}

/* =========================
   BUTTONS
========================= */
button {
  cursor: pointer;
}

/* =========================
   TRADE LIST
========================= */
.trade {
  display: flex;
  justify-content: space-between;
  padding: 12px;
  border-bottom: 1px solid #1e293b;
}

/* =========================
   COLORS
========================= */
.green { color: #22c55e; }
.red { color: #ef4444; }

/* =========================
   MOBILE
========================= */
@media (max-width: 768px) {

  .stats {
    grid-template-columns: repeat(2, 1fr);
  }

}

@media (max-width: 480px) {

  .stats {
    grid-template-columns: 1fr;
  }

}

</style>
<body>

<!-- NAV -->
<div class="nav">
  <div class="nav-inner">

    <div class="nav-left">
      <img src="images/logo.png" class="nav-logo">
      <a href="index.html" class="logo-text">EdgeBreak</a>
    </div>

    <div class="nav-links">
      <a href="index.html" class="nav-link">Trading Desk</a>
      <a href="dashboard.html" class="nav-link">My Dashboard</a>
      <button onclick="window.location.href='pricing.html'" class="nav-cta">
        Upgrade
      </button>
    </div>

  </div>
</div>

<div class="container">

  <!-- HEADER -->
  <div class="header" style="margin-top:20px;">
    <h1>My Dashboard</h1>
    <p style="color:#94a3b8;">
      Track your trades and monitor your performance
    </p>
  </div>

  <!-- =========================
       YOUR TRADES
  ========================= -->
  <div class="section">

    <h3 style="margin-bottom:15px;">Your Trades</h3>

    <div class="stats">

      <div class="stat">
        <div class="label">Symbol</div>
        <input id="userSymbol" type="text" placeholder="AAPL"
          style="width:100%; padding:8px; border-radius:6px; border:none;">
      </div>

      <div class="stat">
        <div class="label">Entry Price</div>
        <input id="userEntry" type="number" placeholder="100"
          style="width:100%; padding:8px; border-radius:6px; border:none;">
      </div>

      <div class="stat">
        <div class="label">Exit Price</div>
        <input id="userExit" type="number" placeholder="110"
          style="width:100%; padding:8px; border-radius:6px; border:none;">
      </div>

      <div class="stat">
        <div class="label">Add Trade</div>
        <button onclick="addUserTrade()" class="nav-cta">
          Add
        </button>
      </div>

    </div>

    <!-- TRADE LIST -->
    <div id="userTradesList" style="margin-top:20px;"></div>

  </div>

</div>

<!-- =========================
     YOUR STATS
========================= -->
<div class="section">

  <h3 style="margin-bottom:15px;">Your Stats</h3>

  <div class="stats">

    <div class="stat">
      <div class="label">Win Rate</div>
      <div class="value" id="userWinRate">-</div>
    </div>

    <div class="stat">
      <div class="label">Avg Return</div>
      <div class="value" id="userAvgReturn">-</div>
    </div>

    <div class="stat">
      <div class="label">Profit Factor</div>
      <div class="value" id="userProfitFactor">-</div>
    </div>

    <div class="stat">
      <div class="label">Trades Taken</div>
      <div class="value" id="userTradesCount">-</div>
    </div>

  </div>

</div>

<!-- =========================
     JS
========================= -->
<script>

// LOAD
function getUserTrades() {
  return JSON.parse(localStorage.getItem("userTrades") || "[]");
}

function saveUserTrades(trades) {
  localStorage.setItem("userTrades", JSON.stringify(trades));
}

// ADD TRADE
function addUserTrade() {

  const symbol = document.getElementById("userSymbol").value;
  const entry = parseFloat(document.getElementById("userEntry").value);
  const exit = parseFloat(document.getElementById("userExit").value);

  if (!symbol || !entry || !exit) return alert("Fill all fields");

  const percent = ((exit - entry) / entry) * 100;

  const trades = getUserTrades();

  trades.push({
    symbol,
    entry,
    exit,
    percent
  });

  saveUserTrades(trades);

  renderUserTrades();
  calculateUserStats();
}

// RENDER
function renderUserTrades() {

  const trades = getUserTrades();
  const container = document.getElementById("userTradesList");

  if (!container) return;

  container.innerHTML = trades.map(t => {

    const color = t.percent >= 0 ? "#22c55e" : "#ef4444";

    return `
      <div class="trade">
        <strong>${t.symbol}</strong>
        <span style="color:${color}">
          ${t.percent >= 0 ? "+" : ""}${t.percent.toFixed(2)}%
        </span>
      </div>
    `;
  }).join("");
}

// INIT
renderUserTrades();
calculateUserStats();

// =========================
// 📊 CALCULATE USER STATS
// =========================
function calculateUserStats() {

  const trades = getUserTrades();

  if (trades.length === 0) return;

  let wins = 0;
  let total = 0;
  let totalWins = 0;
  let totalLosses = 0;

  trades.forEach(t => {
    const r = parseFloat(t.percent ?? 0);

    total += r;

    if (r > 0) {
      wins++;
      totalWins += r;
    }

    if (r < 0) {
      totalLosses += Math.abs(r);
    }
  });

  const winRate = (wins / trades.length) * 100;
  const avgReturn = total / trades.length;
  const profitFactor =
    totalLosses > 0 ? totalWins / totalLosses : 0;

  // =========================
  // UPDATE UI
  // =========================

  document.getElementById("userWinRate").innerText =
    winRate.toFixed(1) + "%";

  document.getElementById("userAvgReturn").innerText =
    (avgReturn >= 0 ? "+" : "") + avgReturn.toFixed(2) + "%";

  const avgEl = document.getElementById("userAvgReturn");
  avgEl.style.color = avgReturn >= 0 ? "#22c55e" : "#ef4444";  

  document.getElementById("userProfitFactor").innerText =
    profitFactor.toFixed(2) + "x";

  document.getElementById("userTradesCount").innerText =
    trades.length;
}

</script>

</body>
</html>
