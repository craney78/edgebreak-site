<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EdgeBreak Watchlist</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0f14;
  color: #e6edf3;
}

/* NAVBAR */
.nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 40px;
  border-bottom: 1px solid #1f2933;
}

.logo {
  font-weight: bold;
  font-size: 18px;
}

.nav-links a {
  margin-left: 25px;
  color: #9ca3af;
  text-decoration: none;
  font-size: 14px;
}

.nav-links a:hover {
  color: #ffffff;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

.market-bar {
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 25px;
  font-weight: bold;
}

.market-weak { background: #2a1010; color: #ff6b6b; }

.free-note {
  background: #111827;
  border: 1px solid #1f2933;
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 20px;
  color: #9ca3af;
}

.table {
  width: 100%;
  border-collapse: collapse;
}

.table th, .table td {
  padding: 12px;
}

.table th {
  border-bottom: 1px solid #222;
  color: #8b949e;
}

.table tr {
  position: relative;
}

.table tr:hover {
  background: #11161c;
}

/* LOCKED ROW */
.locked-row {
  filter: blur(4px);
  opacity: 0.5;
}

.lock-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(11,15,20,0.85);
}

.lock-box {
  background: #0b0f14;
  border: 1px solid #22c55e;
  padding: 10px 16px;
  border-radius: 6px;
  font-size: 13px;
  text-align: center;
}

.btn {
  display: inline-block;
  margin-top: 6px;
  padding: 6px 10px;
  background: #22c55e;
  color: black;
  border-radius: 4px;
  font-weight: bold;
  text-decoration: none;
}

/* SCORES */
.score-elite { color: #3ddc97; font-weight: bold; }
.score-strong { color: #58a6ff; }
.score-watch { color: #f0c674; }

/* GRADES */
.grade {
  margin-top: 4px;
  display: inline-block;
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: bold;
}

.grade-Aplus { background: #00ff9c; color: black; }
.grade-A { background: #66ffcc; color: black; }
.grade-Bplus { background: #ffaa00; color: black; }
.grade-B { background: #ff8800; color: black; }
.grade-C { background: #666; color: white; }

a { color: #58a6ff; text-decoration: none; }

.footer {
  margin-top: 40px;
  font-size: 12px;
  color: #6e7681;
}
</style>
</head>

<body>

<!-- ✅ CLEAN NAVBAR -->
<div class="nav">
  <div class="logo">EdgeBreak</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="watchlist.html">Watchlist</a>
    <a href="how-it-works.html">How It Works</a>
    <a href="pricing.html">Pricing</a>
    <a href="faq.html">FAQ</a>
  </div>
</div>

<div class="container">

<h1>💎 EdgeBreak Watchlist</h1>

<div class="market-bar market-weak">
🇺🇸 US MARKET: 🔴 WEAK<br>
<span style="color:#8b949e;">
Breakouts showing low follow-through
</span>
</div>

<div class="free-note">
You are viewing the <strong>free version</strong>.  
Only C-grade setups are visible. Upgrade to unlock high-quality breakouts.
</div>

<table class="table" id="watchlistTable">
<thead>
<tr>
<th>Symbol</th>
<th>Score</th>
<th>Break %</th>
<th>Chart</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div class="footer">
EdgeBreak Intelligence
</div>

</div>

<script>

fetch("/watchlist.json?v=" + new Date().getTime())
  .then(res => res.json())
  .then(data => {

    const gradeOrder = {
      "A+": 5,
      "A": 4,
      "B+": 3,
      "B": 2,
      "C": 1
    };

    data.sort((a, b) => {
      const gradeDiff = (gradeOrder[b.grade] || 0) - (gradeOrder[a.grade] || 0);
      if (gradeDiff !== 0) return gradeDiff;
      return b.score - a.score;
    });

    const tbody = document.querySelector("#watchlistTable tbody");

    data.forEach(item => {

      const grade = item.grade || deriveGrade(item.score);
      const isLocked = grade !== "C";

      const row = document.createElement("tr");

      if (isLocked) {
        row.classList.add("locked-row");
      }

      row.innerHTML = `
        <td>
          <a href="https://www.tradingview.com/chart/?symbol=NASDAQ:${item.symbol}" target="_blank">
            ${item.symbol}
          </a>
        </td>

        <td class="${getScoreClass(item.score)}">
          ${item.score}
          <div class="grade ${getGradeClass(grade)}">
            ${grade}
          </div>
        </td>

        <td>${item.break}%</td>

        <td>
          <a href="https://www.tradingview.com/chart/?symbol=NASDAQ:${item.symbol}" target="_blank">
            View ↗
          </a>
        </td>
      `;

      if (isLocked) {
        const overlay = document.createElement("div");
        overlay.className = "lock-overlay";
        overlay.innerHTML = `
          <div class="lock-box">
            🔒 Premium Setup<br>
            <a href="pricing.html" class="btn">Unlock</a>
          </div>
        `;
        row.appendChild(overlay);
      }

      tbody.appendChild(row);
    });

  });

function deriveGrade(score) {
  if (score >= 50) return "A+";
  if (score >= 45) return "A";
  if (score >= 40) return "B+";
  if (score >= 35) return "B";
  return "C";
}

function getScoreClass(score) {
  if (score >= 50) return "score-elite";
  if (score >= 40) return "score-strong";
  return "score-watch";
}

function getGradeClass(grade) {
  if (grade === "A+") return "grade-Aplus";
  if (grade === "A") return "grade-A";
  if (grade === "B+") return "grade-Bplus";
  if (grade === "B") return "grade-B";
  return "grade-C";
}

</script>

</body>
</html>
