<!DOCTYPE html>
<html>
<head>
<title>EdgeBreak Watchlist</title>
<style>
body { background:#020617; color:#e2e8f0; font-family:Arial; padding:20px; }
.container { max-width:1100px; margin:auto; }
.card { background:#0f172a; padding:20px; border-radius:12px; margin-bottom:20px; }
.stat-line { display:flex; justify-content:space-between; margin:8px 0; }
.green { color:#22c55e; }
.red { color:#ef4444; }
.section { margin-top:40px; }
.trade { display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #1e293b; }
</style>
</head>

<body>

<div class="container">

<h1>EdgeBreak Watchlist</h1>

<!-- TODAY -->
<div class="card">
  <h3>Today's Trades</h3>
  <div id="todayActivity">Loading...</div>
</div>

<!-- MARKET -->
<div class="card">
  <h3>Market Breakdown</h3>
  <div class="stat-line"><span>Small</span><span id="smallPerf">-</span></div>
  <div class="stat-line"><span>Mid</span><span id="midPerf">-</span></div>
  <div class="stat-line"><span>Large</span><span id="largePerf">-</span></div>
</div>

<!-- WATCHLIST -->
<div class="section">
  <h2>Watchlist</h2>
  <div id="watchlist"></div>
</div>

</div>

<script>

fetch("watchlist.json?v=" + Date.now())
.then(res => res.json())
.then(data => {

  console.log("DATA:", data);

  let small = [], mid = [], large = [];
  let html = "";

  data.forEach(t => {

    const entry = Number(t.price || 0);

    // ❌ current_price useless → ignore
    const change = Number(t.change_percent || 0);

    // group
    let group = t.group || "MID";

    if (entry < 20) group = "SMALL";
    else if (entry < 80) group = "MID";
    else group = "LARGE";

    if (group === "SMALL") small.push(change);
    if (group === "MID") mid.push(change);
    if (group === "LARGE") large.push(change);

    html += `
      <div class="trade">
        <div>
          <strong>${t.symbol}</strong><br>
          Entry: $${entry}
        </div>
        <div class="${change>=0?'green':'red'}">
          ${change.toFixed(2)}%
        </div>
      </div>
    `;
  });

  document.getElementById("watchlist").innerHTML = html;

  function avg(arr){
    if(!arr.length) return "0%";
    return (arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(2)+"%";
  }

  document.getElementById("smallPerf").innerText = avg(small);
  document.getElementById("midPerf").innerText = avg(mid);
  document.getElementById("largePerf").innerText = avg(large);

});

</script>

</body>
</html>
