<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EdgeBreak Watchlist</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0f14;
  color: #e6edf3;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

h1 {
  margin-bottom: 10px;
}

/* BACK LINK */
.back {
  display: inline-block;
  margin-bottom: 15px;
  color: #8b949e;
  text-decoration: none;
}

.back:hover {
  text-decoration: underline;
}

/* MARKET BAR */
.market-bar {
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 25px;
  font-weight: bold;
}

.market-weak { background: #2a1010; color: #ff6b6b; }

/* TABLE */
.table {
  width: 100%;
  border-collapse: collapse;
}

.table th, .table td {
  padding: 12px;
  text-align: left;
}

.table th {
  border-bottom: 1px solid #222;
  font-size: 14px;
  color: #8b949e;
}

.table tr {
  border-bottom: 1px solid #161b22;
}

.table tr:hover {
  background: #11161c;
}

/* SCORE */
.score-elite { color: #3ddc97; font-weight: bold; }
.score-strong { color: #58a6ff; }
.score-watch { color: #f0c674; }

/* GRADE BADGE */
.grade {
  display: inline-block;
  margin-top: 4px;
  padding: 2px 6px;
  font-size: 11px;
  border-radius: 4px;
  font-weight: bold;
}

.grade-Aplus { background: #00ff9c; color: black; }
.grade-A { background: #66ffcc; color: black; }
.grade-Bplus { background: #ffaa00; color: black; }
.grade-B { background: #ff8800; color: black; }
.grade-C { background: #666; color: white; }

/* LINKS */
a {
  color: #58a6ff;
  text-decoration: none;
}

a:hover {
  text-decoration: underline;
}

/* FOOTER */
.footer {
  margin-top: 40px;
  font-size: 12px;
  color: #6e7681;
}
</style>
</head>

<body>

<div class="container">

<a href="index.html" class="back">← Back to Home</a>

<h1>💎 EdgeBreak Watchlist</h1>

<!-- MARKET STATUS -->
<div class="market-bar market-weak">
🇺🇸 US MARKET: 🔴 WEAK<br>
<span style="font-weight: normal; color: #8b949e;">
Breakouts are showing low follow-through. Focus on high-quality setups only.
</span>
</div>

<!-- TABLE -->
<table class="table" id="watchlistTable">
<thead>
<tr>
<th>Symbol</th>
<th>Score</th>
<th>Break %</th>
<th>Chart</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div class="footer">
EdgeBreak Intelligence — High-quality breakout setups. Not financial advice.
</div>

</div>

<script>

// 🔥 LOAD LIVE DATA (CACHE FIX INCLUDED)
fetch("watchlist.json?v=" + new Date().getTime())
  .then(res => res.json())
  .then(data => {

    // 🔥 MATCH ENGINE RANKING
    const gradeOrder = {
      "A+": 5,
      "A": 4,
      "B+": 3,
      "B": 2,
      "C": 1
    };

    data.sort((a, b) => {
      const gradeDiff = (gradeOrder[b.grade] || 0) - (gradeOrder[a.grade] || 0);
      if (gradeDiff !== 0) return gradeDiff;
      return b.score - a.score;
    });

    const tbody = document.querySelector("#watchlistTable tbody");

    data.forEach(item => {

      const gradeClass = getGradeClass(item.grade);

      const row = document.createElement("tr");

      row.innerHTML = `
        <td>
          <a href="https://www.tradingview.com/chart/?symbol=NASDAQ:${item.symbol}" target="_blank">
            ${item.symbol}
          </a>
        </td>

        <td class="${getScoreClass(item.score)}">
          ${item.score}
          <div class="grade ${gradeClass}">
            ${item.grade || ""}
          </div>
        </td>

        <td>${item.break}%</td>

        <td>
          <a href="https://www.tradingview.com/chart/?symbol=NASDAQ:${item.symbol}" target="_blank">
            View ↗
          </a>
        </td>
      `;

      tbody.appendChild(row);
    });

  });

// HELPERS

function getScoreClass(score) {
  if (score >= 50) return "score-elite";
  if (score >= 40) return "score-strong";
  return "score-watch";
}

function getGradeClass(grade) {
  if (grade === "A+") return "grade-Aplus";
  if (grade === "A") return "grade-A";
  if (grade === "B+") return "grade-Bplus";
  if (grade === "B") return "grade-B";
  return "grade-C";
}

</script>

</body>
</html>
