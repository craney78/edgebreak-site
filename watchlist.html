<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EdgeBreak Trading Desk</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #020617;
  color: #e2e8f0;
  padding: 80px 20px;
}

/* CONTAINER */
.container {
  max-width: 1100px;
  margin: auto;
}

/* HEADER */
.header {
  margin-bottom: 20px;
}

.header h1 {
  margin: 0;
  font-size: 36px;
}

.header p {
  color: #94a3b8;
}

/* TOP GRID */
.top-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

/* CARD */
.card {
  background: #0f172a;
  padding: 20px;
  border-radius: 12px;
  border: 1px solid #1e293b;
}

/* STATS STRIP */
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 15px;
  margin: 20px 0;
}

.stat {
  background: #0f172a;
  padding: 15px;
  border-radius: 10px;
  border: 1px solid #1e293b;
}

.label {
  font-size: 12px;
  color: #64748b;
}

.value {
  font-size: 20px;
  font-weight: bold;
}

/* TABLE */
.table-container {
  background: #0f172a;
  border-radius: 12px;
  border: 1px solid #1e293b;
  overflow: hidden;
  margin-top: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  padding: 14px;
  font-size: 12px;
  color: #64748b;
  text-align: left;
  border-bottom: 1px solid #1e293b;
}

td {
  padding: 14px;
  border-bottom: 1px solid #1e293b;
}

tr:hover {
  background: rgba(34,197,94,0.05);
}

/* STATUS */
.green { color: #22c55e; }
.red { color: #ef4444; }

.status {
  font-size: 12px;
  padding: 4px 8px;
  border-radius: 6px;
}

.breaking {
  background: rgba(34,197,94,0.15);
  color: #22c55e;
}

.holding {
  background: rgba(59,130,246,0.15);
  color: #3b82f6;
}

/* CHART BOX */
.chart-box {
  background: #020617;
  border: 1px solid #1e293b;
  border-radius: 10px;
  padding: 16px;
  text-align: center;
  cursor: pointer;
  color: #94a3b8;
  transition: 0.2s;
}

.chart-box:hover {
  border-color: #22c55e;
  color: #22c55e;
  transform: translateY(-2px);
}

/* STAT LINES */
.stat-line {
  display: flex;
  justify-content: space-between;
  margin: 10px 0;
}
</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header" style="display:flex; align-items:center; gap:15px;">
  <img src="logo.png" style="width:50px;">
  <div>
    <h1 style="margin:0;">EdgeBreak Trading Desk</h1>
    <p>Daily breakout signals powered by real data</p>
  </div>
</div>

  <!-- TOP GRID -->
  <div class="card">
  <h3>Today’s Activity</h3>

  <div class="stat-line">
    <span>Opened</span>
    <span id="todayOpen">0</span>
  </div>

  <div class="stat-line">
    <span>Closed</span>
    <span id="todayClosed">0</span>
  </div>

  <div id="todayActivity" style="margin-top:10px;"></div>
</div>

    <!-- NOTIFICATIONS -->
    <div class="card">
      <h3>Today’s Activity</h3>
      <div id="todayActivity">Loading...</div>
    </div>

    <!-- MARKET BREAKDOWN -->
    <div class="card">
      <h3>Market Breakdown</h3>

      <div class="stat-line">
        <span>Small Caps</span>
        <span id="smallPerf">-</span>
      </div>

      <div class="stat-line">
        <span>Mid Caps</span>
        <span id="midPerf">-</span>
      </div>

      <div class="stat-line">
        <span>Large Caps</span>
        <span id="largePerf">-</span>
      </div>
    </div>

  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat">
      <div class="label">Active Trades</div>
      <div class="value" id="activeCount">-</div>
    </div>

    <div class="stat">
      <div class="label">Avg Return</div>
      <div class="value" id="avgReturn">-</div>
    </div>

    <div class="stat">
      <div class="label">Best Trade</div>
      <div class="value green" id="bestTrade">-</div>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <!-- SECTIONS -->
          <div id="smallSection"></div>
          <div id="midSection"></div>
          <div id="largeSection"></div>
        </tr>
      </thead>
      <tbody id="watchlistTable"></tbody>
    </table>
  </div>

</div>

<script>

// 🔔 ACTIVITY
fetch("activity.json")
.then(res => res.json())
.then(data => {

  const today = new Date().toISOString().slice(0,10);

  const todays = data.filter(a => a.date.startsWith(today));

  let open = 0;
  let closed = 0;

  const html = todays.map(a => {

    if (a.type === "OPEN") {
      open++;
      return `<div class="green">🟢 ${a.symbol} opened</div>`;
    }

    if (a.type === "CLOSED") {
      closed++;
      return `<div class="red">🔴 ${a.symbol} closed (${a.return}%)</div>`;
    }

  }).join("");

  document.getElementById("todayActivity").innerHTML =
    html || "No activity today";

  document.getElementById("todayOpen").innerText = open;
  document.getElementById("todayClosed").innerText = closed;

});


<script>

<script>

document.addEventListener("DOMContentLoaded", function () {

  console.log("🚀 Watchlist Page Loaded");

  // =========================
  // 🔔 TODAY ACTIVITY
  // =========================
  fetch("activity.json")
  .then(res => res.json())
  .then(data => {

    const today = new Date().toISOString().slice(0,10);

    let open = 0;
    let closed = 0;

    const html = data.map(a => {

      if (!a.date || !a.type) return "";

      if (a.date.includes(today)) {

        if (a.type === "OPEN") {
          open++;
          return `<div class="green">🟢 ${a.symbol} opened</div>`;
        }

        if (a.type === "CLOSED") {
          closed++;
          return `<div class="red">🔴 ${a.symbol} closed (${a.return}%)</div>`;
        }
      }

      return "";

    }).join("");

    document.getElementById("todayActivity").innerHTML =
      html || "No activity today";

    document.getElementById("todayOpen").innerText = open;
    document.getElementById("todayClosed").innerText = closed;

  })
  .catch(err => console.error("Activity error:", err));


  // =========================
  // 📊 WATCHLIST + ALL STATS
  // =========================
  fetch("watchlist.json")
  .then(res => res.json())
  .then(data => {

    let total = 0;
    let count = 0;
    let best = -999;

    let smallHTML = "", midHTML = "", largeHTML = "";
    let smallStats = [], midStats = [], largeStats = [];

    // =========================
    // 🔧 BUILD TRADE CARD
    // =========================
    function buildTradeBox(t) {

      const entry = Number(t.entry_price) || 0;
      const change = Number(t.change_percent) || 0;
      const color = change >= 0 ? "green" : "red";

      return `
        <div class="card" style="margin-bottom:15px;">
          <div style="display:flex; justify-content:space-between;">
            <strong>${t.symbol}</strong>
            <span class="${color}">${change.toFixed(2)}%</span>
          </div>

          <div style="font-size:13px; color:#94a3b8; margin-top:5px;">
            Entry: $${entry.toFixed(2)}<br>
            Date: ${t.signal_date || "-"}
          </div>

          <div style="margin-top:10px;">
            <span class="status ${t.status}">
              ${t.status}
            </span>
          </div>

          <div class="chart-box" onclick="handleChartClick('${t.symbol}')">
            📈 View Chart
          </div>
        </div>
      `;
    }

    // =========================
    // 🔄 PROCESS DATA
    // =========================
    data.forEach(t => {

      const change = Number(t.change_percent) || 0;

      total += change;
      count++;

      if (change > best) best = change;

      if (t.price_group === "SMALL") {
        smallHTML += buildTradeBox(t);
        smallStats.push(change);
      }

      if (t.price_group === "MID") {
        midHTML += buildTradeBox(t);
        midStats.push(change);
      }

      if (t.price_group === "LARGE") {
        largeHTML += buildTradeBox(t);
        largeStats.push(change);
      }

    });

    // =========================
    // 📊 HELPERS
    // =========================
    function avg(arr) {
      if (!arr.length) return "0%";

      const clean = arr.map(Number).filter(n => !isNaN(n));
      if (!clean.length) return "0%";

      return (clean.reduce((a,b)=>a+b,0)/clean.length).toFixed(2) + "%";
    }

    function bestVal(arr) {
      if (!arr.length) return "0%";
      return Math.max(...arr).toFixed(2) + "%";
    }

    // =========================
    // 🧱 BUILD SECTIONS
    // =========================
    function buildSection(title, html, stats) {
      return `
        <h2 style="margin-top:30px;">${title}</h2>

        <div class="stats">
          <div class="stat">
            <div class="label">Trades</div>
            <div class="value">${stats.length}</div>
          </div>

          <div class="stat">
            <div class="label">Avg Return</div>
            <div class="value">${avg(stats)}</div>
          </div>

          <div class="stat">
            <div class="label">Best</div>
            <div class="value">${bestVal(stats)}</div>
          </div>
        </div>

        ${html || "<p style='color:#64748b;'>No trades</p>"}
      `;
    }

    document.getElementById("smallSection").innerHTML =
      buildSection("🟢 Small Cap Desk", smallHTML, smallStats);

    document.getElementById("midSection").innerHTML =
      buildSection("🟡 Mid Cap Desk", midHTML, midStats);

    document.getElementById("largeSection").innerHTML =
      buildSection("🔵 Large Cap Desk", largeHTML, largeStats);

    // =========================
    // 🔥 MAIN STATS STRIP
    // =========================
    document.getElementById("activeCount").innerText = count;

    document.getElementById("avgReturn").innerText =
      count ? (total / count).toFixed(2) + "%" : "0%";

    document.getElementById("bestTrade").innerText =
      best > -999 ? "+" + best.toFixed(2) + "%" : "0%";

    // =========================
    // 📊 MARKET BREAKDOWN
    // =========================
    document.getElementById("smallPerf").innerText = avg(smallStats);
    document.getElementById("midPerf").innerText = avg(midStats);
    document.getElementById("largePerf").innerText = avg(largeStats);

  })
  .catch(err => console.error("Watchlist error:", err));


  // =========================
  // 🔒 CHART CLICK (PAYWALL)
  // =========================
  window.handleChartClick = function(symbol) {

    const isPaid = localStorage.getItem("paidUser");

    if (!isPaid) {
      window.location.href = "pricing.html";
      return;
    }

    window.location.href = `chart.html?symbol=${symbol}`;
  };

});

</script>
