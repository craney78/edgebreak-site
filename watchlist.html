<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EdgeBreak Trading Desk</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #020617;
  color: #e2e8f0;
  padding: 80px 20px;
}

.container {
  max-width: 1100px;
  margin: auto;
}

.header {
  display: flex;
  align-items: center;
  gap: 15px;
  margin-bottom: 20px;
}

.top-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.card {
  background: #0f172a;
  padding: 20px;
  border-radius: 12px;
  border: 1px solid #1e293b;
}

.stat-line {
  display: flex;
  justify-content: space-between;
  margin: 8px 0;
}

.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 15px;
  margin: 20px 0;
}

.stat {
  background: #0f172a;
  padding: 15px;
  border-radius: 10px;
  border: 1px solid #1e293b;
}

.label { font-size: 12px; color: #64748b; }
.value { font-size: 20px; font-weight: bold; }

.green { color: #22c55e; }
.red { color: #ef4444; }

.section { margin-top: 30px; }

.trade {
  display: flex;
  justify-content: space-between;
  padding: 12px;
  border-bottom: 1px solid #1e293b;
}

.nav-logo {
  width: 30px;
  filter: drop-shadow(0 0 6px rgba(34,197,94,0.5));
}

.logo-text {
  font-weight: bold;
  color: white;
  text-decoration: none;
  letter-spacing: 1px;
  font-size: 16px;
}

.live-badge {
  font-size: 10px;
  padding: 4px 8px;
  border-radius: 6px;
  background: rgba(34,197,94,0.15);
  color: #22c55e;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% { opacity: 0.6; }
  50% { opacity: 1; }
  100% { opacity: 0.6; }
}

/* NAVBAR */
.nav {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(2,6,23,0.85);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(30,41,59,0.6);
  z-index: 1000;
}

.nav-inner {
  max-width: 1100px;
  margin: auto;
  padding: 14px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* LEFT */
.nav-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* LINKS */
.nav-links {
  display: flex;
  align-items: center;
  gap: 20px;
}

.nav-link {
  text-decoration: none;
  color: #94a3b8;
  font-size: 14px;
  transition: 0.2s;
}

.nav-link:hover {
  color: #22c55e;
}

/* CTA */
.nav-cta {
  background: linear-gradient(90deg, #22c55e, #16a34a);
  border: none;
  padding: 8px 16px;
  border-radius: 8px;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.nav-cta:hover {
  transform: translateY(-1px);
}

/* MOBILE */
.menu-toggle {
  display: none;
  font-size: 22px;
  cursor: pointer;
}

.mobile-menu {
  display: none;
  flex-direction: column;
  background: #020617;
  border-top: 1px solid #1e293b;
}

.mobile-menu a {
  padding: 15px;
  text-decoration: none;
  color: #94a3b8;
  border-bottom: 1px solid #1e293b;
}

.mobile-menu a:hover {
  color: #22c55e;
}

.mobile-cta {
  background: #22c55e;
  color: white !important;
  text-align: center;
}

/* MOBILE BREAKPOINT */
@media (max-width: 768px) {

  .nav-links {
    display: none;
  }

  .menu-toggle {
    display: block;
  }

  .mobile-menu.active {
    display: flex;
  }
}

</style>
</head>

<body>

<div class="nav">
  <div class="nav-inner">

    <!-- LEFT -->
    <div class="nav-left">
      <img src="images/logo.png" class="nav-logo">
      <a href="index.html" class="logo-text">EDGEBREAK</a>
      <span class="live-badge">● LIVE</span>
    </div>

    <!-- DESKTOP LINKS -->
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="index.html#statsGrid" class="nav-link">Performance</a>
      <a href="watchlist.html" class="nav-link">Trading Desk</a>
      <a href="trading-guide.html" class="nav-link">Guide</a>
      <a href="pricing.html" class="nav-cta">Unlock</a>
    </div>

    <!-- MOBILE BUTTON -->
    <div class="menu-toggle" onclick="toggleMenu()">
      ☰
    </div>

  </div>

  <!-- MOBILE MENU -->
  <!-- MOBILE MENU -->
<div class="mobile-menu" id="mobileMenu">
  <a href="index.html">Home</a>
  <a href="index.html#statsGrid">Performance</a>
  <a href="watchlist.html">Trading Desk</a>
  <a href="trading-guide.html">Guide</a>
  <a href="pricing.html" class="mobile-cta">Unlock</a>
</div>
</div>

<div class="container">

<!-- HEADER -->
<div class="header">
  <img src="logo.png" style="width:50px;">
  <div>
    <h1>EdgeBreak Trading Desk</h1>
    <p>Daily breakout signals powered by real data</p>
  </div>
</div>

<!-- TOP GRID -->
<div class="top-grid">

  <!-- TODAY -->
  <div class="card">
    <h3>Today's Trades</h3>
    <div class="stat-line"><span>Opened</span><span id="todayOpen">0</span></div>
    <div class="stat-line"><span>Closed</span><span id="todayClosed">0</span></div>
    <div id="todayActivity"></div>
  </div>

  <!-- MARKET -->
  <div class="card">
    <h3>Market Breakdown</h3>
    <div class="stat-line"><span>Small</span><span id="smallPerf">-</span></div>
    <div class="stat-line"><span>Mid</span><span id="midPerf">-</span></div>
    <div class="stat-line"><span>Large</span><span id="largePerf">-</span></div>
  </div>

</div>

<!-- STATS -->
<div class="stats">
  <div class="stat">
    <div class="label">Active Trades</div>
    <div class="value" id="activeCount">-</div>
  </div>
  <div class="stat">
    <div class="label">Avg Return</div>
    <div class="value" id="avgReturn">-</div>
  </div>
  <div class="stat">
    <div class="label">Best Trade</div>
    <div class="value green" id="bestTrade">-</div>
  </div>
</div>

<!-- WATCHLIST SECTIONS -->
<div id="smallSection" class="section"></div>
<div id="midSection" class="section"></div>
<div id="largeSection" class="section"></div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

  console.log("✅ PAGE RUNNING");

  // =========================
  // 🔔 TODAY ACTIVITY
  // =========================
  fetch("activity.json?v=" + Date.now())
  .then(res => res.json())
  .then(data => {

    let open = 0;
    let closed = 0;

    const html = data.map(a => {

      if (a.type === "OPEN") {
        open++;
        return `<div class="green">🟢 ${a.symbol} @ $${a.price}</div>`;
      }

      if (a.type === "CLOSED") {
        closed++;
        return `<div class="red">🔴 ${a.symbol} (${a.return}%)</div>`;
      }

      return "";

    }).slice(0,5).join("");

    document.getElementById("todayOpen").innerText = open;
    document.getElementById("todayClosed").innerText = closed;
    document.getElementById("todayActivity").innerHTML = html || "No activity";

  })
  .catch(() => {
    document.getElementById("todayActivity").innerText = "No activity";
  });


  // =========================
  // 📊 WATCHLIST
  // =========================
  fetch("watchlist.json?v=" + Date.now())
  .then(res => res.json())
  .then(data => {

    let smallHTML="", midHTML="", largeHTML="";
    let small=[], mid=[], large=[];

    let total = 0;
    let count = 0;
    let best = -999;

    data.forEach(t => {

      const entry = Number(t.price || 0);
      let change = Number(t.change_percent || 0);

      // 🔥 fallback calculation
      if (change === 0) {
        const entry = Number(t.price || 0);
        const current = Number(t.current_price || 0);

        if (entry && current && current !== 0) {
          change = ((current - entry) / entry) * 100;
        }
      }
      const group = t.group || "MID";

      total += change;
      count++;
      if (change > best) best = change;

      const row = `
        <div class="trade">
          <div>
            <strong>${t.symbol}</strong><br>
            $${entry.toFixed(2)}<br>
            ${t.signal_date || ""}
          </div>
          <div class="${change >= 0 ? 'green' : 'red'}">
            ${change.toFixed(2)}%
          </div>
        </div>
      `;

      if (group === "SMALL") { smallHTML += row; small.push(change); }
      if (group === "MID") { midHTML += row; mid.push(change); }
      if (group === "LARGE") { largeHTML += row; large.push(change); }

    });

    function avg(arr){
      if(!arr.length) return "0%";
      return (arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(2)+"%";
    }

    document.getElementById("smallSection").innerHTML = "<h2>🟢 Small Cap</h2>" + smallHTML;
    document.getElementById("midSection").innerHTML = "<h2>🟡 Mid Cap</h2>" + midHTML;
    document.getElementById("largeSection").innerHTML = "<h2>🔵 Large Cap</h2>" + largeHTML;

    document.getElementById("activeCount").innerText = count;
    document.getElementById("avgReturn").innerText = count ? (total/count).toFixed(2)+"%" : "0%";
    document.getElementById("bestTrade").innerText = best > -999 ? best.toFixed(2)+"%" : "0%";

    document.getElementById("smallPerf").innerText = avg(small);
    document.getElementById("midPerf").innerText = avg(mid);
    document.getElementById("largePerf").innerText = avg(large);

  })
  .catch(() => {
    console.error("Watchlist failed to load");
  });

});

</script>

<script>
function toggleMenu() {
  const menu = document.getElementById("mobileMenu");
  menu.classList.toggle("active");
}
</script>

</body>
</html>
