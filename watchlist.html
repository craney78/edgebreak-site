<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EdgeBreak Watchlist</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0f14;
  color: #e6edf3;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

h1 {
  margin-bottom: 10px;
}

.market-bar {
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 25px;
  font-weight: bold;
}

.market-strong { background: #0f2a1d; color: #3ddc97; }
.market-mixed { background: #2a260f; color: #f0c674; }
.market-weak  { background: #2a1010; color: #ff6b6b; }

.table {
  width: 100%;
  border-collapse: collapse;
}

.table th, .table td {
  padding: 12px;
  text-align: left;
}

.table th {
  border-bottom: 1px solid #222;
  font-size: 14px;
  color: #8b949e;
}

.table tr {
  border-bottom: 1px solid #161b22;
}

.table tr:hover {
  background: #11161c;
}

.score-elite { color: #3ddc97; font-weight: bold; }
.score-strong { color: #58a6ff; }
.score-watch { color: #f0c674; }

.age-day0 { color: #3ddc97; }
.age-day1 { color: #58a6ff; }
.age-day2 { color: #f0c674; }
.age-day3 { color: #8b949e; }

.status {
  font-size: 12px;
  padding: 4px 8px;
  border-radius: 6px;
}

.status-breaking { background: #1f6feb33; color: #58a6ff; }
.status-holding { background: #23863633; color: #3ddc97; }
.status-fading { background: #da363333; color: #ff6b6b; }

a {
  color: #58a6ff;
  text-decoration: none;
}

a:hover {
  text-decoration: underline;
}

.footer {
  margin-top: 40px;
  font-size: 12px;
  color: #6e7681;
}
</style>
</head>

<body>

<div class="container">

<!-- BACK LINK -->
<a href="index.html" style="color:#8b949e; text-decoration:none; font-size:14px;">
  ← Back to Home
</a>

<h1>💎 EdgeBreak Watchlist</h1>

<!-- MARKET STATUS -->
<div class="market-bar market-weak">
🇺🇸 US MARKET: 🔴 WEAK<br>
<span style="font-weight: normal; color: #8b949e;">
Breakouts are showing low follow-through. Focus on high-quality setups only.
</span>
</div>

<!-- WATCHLIST TABLE -->
<table class="table" id="watchlistTable">
<thead>
<tr>
<th>Symbol</th>
<th>Score</th>
<th>Break %</th>
<th>Age</th>
<th>Status</th>
<th>Chart</th>
</tr>
</thead>
<tbody>
</tbody>
</table>

<div class="footer">
EdgeBreak Intelligence — High-quality breakout setups. Not financial advice.
</div>

</div>

<script>
// 🔥 SAMPLE DATA (REPLACE WITH REAL DATA LATER)
const data = [
  { symbol: "NVDA", score: 52, break: 3.1, age: 0, status: "breaking" },
  { symbol: "ARM", score: 45, break: 2.4, age: 1, status: "holding" },
  { symbol: "SMCI", score: 41, break: 1.9, age: 2, status: "fading" }
];

// 🔥 SORT BEST FIRST
data.sort((a, b) => b.score - a.score);

// HELPERS
function getScoreClass(score) {
  if (score >= 50) return "score-elite";
  if (score >= 40) return "score-strong";
  return "score-watch";
}

function getTier(score) {
  if (score >= 50) return "💎 Elite";
  if (score >= 40) return "🔥 Strong";
  return "⚡ Watch";
}

function getAgeLabel(age) {
  return [
    "<span class='age-day0'>🔥 Day 0</span>",
    "<span class='age-day1'>✅ Day 1</span>",
    "<span class='age-day2'>⚠️ Day 2</span>",
    "<span class='age-day3'>💤 Day 3</span>"
  ][age];
}

function getStatusLabel(status) {
  const map = {
    breaking: "<span class='status status-breaking'>Breaking Now</span>",
    holding: "<span class='status status-holding'>Holding</span>",
    fading: "<span class='status status-fading'>Fading</span>"
  };
  return map[status];
}

function getChartLink(symbol) {
  return `
    <a href="https://www.tradingview.com/chart/?symbol=NASDAQ:${symbol}" target="_blank">
      View Chart ↗
    </a>
  `;
}

// RENDER TABLE
const tbody = document.querySelector("#watchlistTable tbody");

data.forEach(item => {
  const row = document.createElement("tr");

  row.innerHTML = `
    <td>
      <a href="https://www.tradingview.com/chart/?symbol=NASDAQ:${item.symbol}" target="_blank">
        ${item.symbol}
      </a>
    </td>
    <td class="${getScoreClass(item.score)}">
      ${item.score}<br>
      <span style="font-size:12px; color:#8b949e;">${getTier(item.score)}</span>
    </td>
    <td>${item.break}%</td>
    <td>${getAgeLabel(item.age)}</td>
    <td>${getStatusLabel(item.status)}</td>
    <td>${getChartLink(item.symbol)}</td>
  `;

  tbody.appendChild(row);
});
</script>

</body>
</html>
