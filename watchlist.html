<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EdgeBreak Trading Desk</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #020617;
  color: #e2e8f0;
  padding: 80px 20px;
}

/* CONTAINER */
.container {
  max-width: 1100px;
  margin: auto;
}

/* HEADER */
.header {
  margin-bottom: 20px;
}

.header h1 {
  margin: 0;
  font-size: 36px;
}

.header p {
  color: #94a3b8;
}

/* TOP GRID */
.top-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

/* CARD */
.card {
  background: #0f172a;
  padding: 20px;
  border-radius: 12px;
  border: 1px solid #1e293b;
}

/* STATS STRIP */
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 15px;
  margin: 20px 0;
}

.stat {
  background: #0f172a;
  padding: 15px;
  border-radius: 10px;
  border: 1px solid #1e293b;
}

.label {
  font-size: 12px;
  color: #64748b;
}

.value {
  font-size: 20px;
  font-weight: bold;
}

/* TABLE */
.table-container {
  background: #0f172a;
  border-radius: 12px;
  border: 1px solid #1e293b;
  overflow: hidden;
  margin-top: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  padding: 14px;
  font-size: 12px;
  color: #64748b;
  text-align: left;
  border-bottom: 1px solid #1e293b;
}

td {
  padding: 14px;
  border-bottom: 1px solid #1e293b;
}

tr:hover {
  background: rgba(34,197,94,0.05);
}

/* STATUS */
.green { color: #22c55e; }
.red { color: #ef4444; }

.status {
  font-size: 12px;
  padding: 4px 8px;
  border-radius: 6px;
}

.breaking {
  background: rgba(34,197,94,0.15);
  color: #22c55e;
}

.holding {
  background: rgba(59,130,246,0.15);
  color: #3b82f6;
}

/* CHART BOX */
.chart-box {
  background: #020617;
  border: 1px solid #1e293b;
  border-radius: 10px;
  padding: 16px;
  text-align: center;
  cursor: pointer;
  color: #94a3b8;
  transition: 0.2s;
}

.chart-box:hover {
  border-color: #22c55e;
  color: #22c55e;
  transform: translateY(-2px);
}

/* STAT LINES */
.stat-line {
  display: flex;
  justify-content: space-between;
  margin: 10px 0;
}
</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <h1>EdgeBreak Trading Desk</h1>
    <p>Daily breakout signals powered by real data</p>
  </div>

  <!-- TOP GRID -->
  <div class="top-grid">

    <!-- NOTIFICATIONS -->
    <div class="card">
      <h3>Today’s Activity</h3>
      <div id="todayActivity">Loading...</div>
    </div>

    <!-- MARKET BREAKDOWN -->
    <div class="card">
      <h3>Market Breakdown</h3>

      <div class="stat-line">
        <span>Small Caps</span>
        <span id="smallPerf">-</span>
      </div>

      <div class="stat-line">
        <span>Mid Caps</span>
        <span id="midPerf">-</span>
      </div>

      <div class="stat-line">
        <span>Large Caps</span>
        <span id="largePerf">-</span>
      </div>
    </div>

  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat">
      <div class="label">Active Trades</div>
      <div class="value" id="activeCount">-</div>
    </div>

    <div class="stat">
      <div class="label">Avg Return</div>
      <div class="value" id="avgReturn">-</div>
    </div>

    <div class="stat">
      <div class="label">Best Trade</div>
      <div class="value green" id="bestTrade">-</div>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Symbol</th>
          <th>Entry</th>
          <th>Return</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="watchlistTable"></tbody>
    </table>
  </div>

</div>

<script>

// 🔔 ACTIVITY
fetch("activity.json")
.then(res => res.json())
.then(data => {

  const today = new Date().toISOString().slice(0,10);

  const todays = data.filter(a => a.date.startsWith(today));

  const html = todays.map(a => {

    if (a.type === "OPEN") {
      return `<div class="green">🟢 ${a.symbol} opened</div>`;
    }

    if (a.type === "CLOSED") {
      return `<div class="red">🔴 ${a.symbol} closed (${a.return}%)</div>`;
    }

  }).join("");

  document.getElementById("todayActivity").innerHTML =
    html || "No activity today";

});


// 📊 WATCHLIST
fetch("watchlist.json")
.then(res => res.json())
.then(data => {

  let total = 0;
  let count = 0;
  let best = -999;

  let small = [], mid = [], large = [];

  const rows = data.map(t => {

    const entry = t.entry_price || 0;
    const change = t.change_percent || 0;

    const color = change >= 0 ? "green" : "red";

    total += change;
    count++;

    if (change > best) best = change;

    // GROUPS
    if (t.price_group === "SMALL") small.push(change);
    if (t.price_group === "MID") mid.push(change);
    if (t.price_group === "LARGE") large.push(change);

    return `
<tr>
  <td><strong>${t.symbol}</strong></td>
  <td>$${entry.toFixed(2)}</td>
  <td class="${color}">
    ${change.toFixed(2)}%
  </td>
  <td>
    <span class="status ${t.status}">
      ${t.status}
    </span>
  </td>
</tr>

<tr>
  <td colspan="4">
    <div class="chart-box" onclick="handleChartClick('${t.symbol}')">
      📈 View Chart
    </div>
  </td>
</tr>
`;
  });

  document.getElementById("watchlistTable").innerHTML = rows.join("");

  // STATS
  document.getElementById("activeCount").innerText = count;
  document.getElementById("avgReturn").innerText = (total / count).toFixed(2) + "%";
  document.getElementById("bestTrade").innerText = "+" + best.toFixed(2) + "%";

  function avg(arr) {
    if (!arr.length) return "0%";
    return (arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(2) + "%";
  }

  document.getElementById("smallPerf").innerText = avg(small);
  document.getElementById("midPerf").innerText = avg(mid);
  document.getElementById("largePerf").innerText = avg(large);

});


// 🔒 CHART CLICK
function handleChartClick(symbol) {

  const isPaid = localStorage.getItem("paidUser");

  if (!isPaid) {
    window.location.href = "pricing.html";
    return;
  }

  window.location.href = `chart.html?symbol=${symbol}`;
}

</script>

</body>
</html>
