<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EdgeBreak Watchlist</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0f14;
  color: #e6edf3;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.logo-top {
  text-align: center;
  margin-bottom: 10px;
}

.logo-top img {
  height: 60px;
}

.back {
  display: inline-block;
  margin-bottom: 15px;
  color: #8b949e;
  text-decoration: none;
}

.section-title {
  margin: 30px 0 10px;
  font-size: 16px;
  color: #8b949e;
  text-transform: uppercase;
}

.box {
  background: #11161c;
  border: 1px solid #30363d;
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 12px;
  transition: 0.2s;
}

.box:hover {
  border-color: #22c55e;
}

.strong {
  border-left: 3px solid #00ff88;
  box-shadow: 0 0 20px rgba(0,255,120,0.15);
}

.tag {
  font-size: 11px;
  padding: 3px 6px;
  border-radius: 5px;
  margin-left: 6px;
}

.tag-strong {
  background: rgba(0,255,120,0.2);
  color: #00ff88;
}

.lock-message {
  text-align: center;
  margin-top: 20px;
  color: #22c55e;
}

.sticky-cta {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #22c55e;
  color: black;
  padding: 12px 16px;
  border-radius: 8px;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="container">

<div class="logo-top">
  <img src="images/logo.png">
</div>

<a href="index.html" class="back">← Back</a>

<h1>Live Breakout Tracking</h1>

<div id="watchlistContainer"></div>
<div id="lockMessage" class="lock-message"></div>

</div>

<button onclick="goToCheckout()">Unlock Full Access</button>

<!-- CHART MODAL -->
<div id="chartModal" onclick="closeChart()" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
z-index:999;
justify-content:center;
align-items:center;
">
<div onclick="event.stopPropagation();" style="
width:90%;
max-width:900px;
background:#0b0f14;
border-radius:10px;
padding:10px;
">
<span onclick="closeChart()" style="
float:right;
cursor:pointer;
font-size:20px;
">✕</span>

<div id="chartContainer"></div>
</div>
</div>

<script>

// 🔐 SIMULATED ACCESS (replace later with Stripe/login)
const isPremium = localStorage.getItem("edgebreak_token") === "active";

// 🔥 GROUP HELPER
function groupBy(list, key){
  return list.reduce((acc, item) => {
    (acc[item[key]] = acc[item[key]] || []).push(item);
    return acc;
  }, {});
}

// 🔥 LOAD DATA
fetch("watchlist.json?v=" + new Date().getTime())
.then(res => res.json())
.then(data => {

  const container = document.getElementById("watchlistContainer");
  const lock = document.getElementById("lockMessage");

  const setups = data.filter(x => x.status !== "failed");

  const grouped = groupBy(setups, "group");

  let html = "";

  const order = ["SMALL", "MID", "LARGE"];

  order.forEach(group => {

    if (!grouped[group]) return;

    let label = "🟡 Mid Caps";
    if (group === "SMALL") label = "🟢 Small Caps";
    if (group === "LARGE") label = "🔵 Large Caps";

    html += `<div class="section-title">${label}</div>`;

    grouped[group].forEach(stock => {

      const change = Number(stock.change_percent || 0);

      let perfColor = "#8b949e";
      let perfText = "-";

      if (change > 0) {
        perfColor = "#3ddc97";
        perfText = "+" + change.toFixed(2) + "%";
      } else if (change < 0) {
        perfColor = "#ff6b6b";
        perfText = change.toFixed(2) + "%";
      }

      // 📅 ENTRY DATE
      let dateText = "-";
      if (stock.signal_date) {
        const d = new Date(stock.signal_date);
        dateText = d.toLocaleDateString(undefined, {
          month: "short",
          day: "numeric"
        });
      }

      // 🔥 STRONG TRADE
      const isStrong = change >= 10;

      const symbol = isPremium ? stock.symbol : "████";

      html += `
        <div class="box ${isStrong ? "strong" : ""}">
          <div style="display:flex; justify-content:space-between;">
            <strong>
              ${symbol}
              ${isStrong ? `<span class="tag tag-strong">STRONG</span>` : ""}
            </strong>
            <span style="color:${perfColor}; font-weight:bold;">
              ${perfText}
            </span>
          </div>

          <div style="margin-top:6px; font-size:13px; color:#9ca3af;">
            Started: ${dateText}
          </div>

          ${
            isPremium
              ? `
                <button onclick="openChart('${stock.symbol}')">
                  View Chart
                </button>
              `
              : `
                <div style="margin-top:10px; color:#22c55e;">
                  🔒 Unlock to view setups
                </div>
              `
          }
        </div>
      `;
    });

  });

  container.innerHTML = html;

  if (!isPremium) {
    lock.innerHTML = `
      🔒 Breakout setups are hidden<br>
      <a href="pricing.html" style="color:#22c55e; font-weight:bold;">
        Unlock full access →
      </a>
    `;
  }

})
.catch(err => console.error(err));


// 📊 CHART
function openChart(symbol){
  const modal = document.getElementById("chartModal");
  const container = document.getElementById("chartContainer");

  modal.style.display = "flex";

  container.innerHTML = `
    <iframe 
      src="https://s.tradingview.com/widgetembed/?symbol=${symbol}&interval=D&theme=dark"
      style="width:100%; height:500px; border:none;">
    </iframe>
  `;
}

function closeChart(){
  document.getElementById("chartModal").style.display = "none";
}

</script>

</body>
</html>
