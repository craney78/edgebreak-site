<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EdgeBreak Watchlist</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0f14;
  color: #e6edf3;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

.market-bar {
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 25px;
  font-weight: bold;
}

.market-weak { background: #2a1010; color: #ff6b6b; }

.table {
  width: 100%;
  border-collapse: collapse;
}

.table th, .table td {
  padding: 12px;
  text-align: left;
}

.table th {
  border-bottom: 1px solid #222;
  color: #8b949e;
}

.table tr:hover {
  background: #11161c;
}

.score-elite { color: #3ddc97; font-weight: bold; }
.score-strong { color: #58a6ff; }
.score-watch { color: #f0c674; }

.status {
  font-size: 12px;
  padding: 4px 8px;
  border-radius: 6px;
}

.status-breaking { background: #1f6feb33; color: #58a6ff; }

.footer {
  margin-top: 40px;
  font-size: 12px;
  color: #6e7681;
}
</style>
</head>

<body>

<div class="container">

<a href="index.html" style="color:#8b949e;">← Back</a>

<h1>💎 EdgeBreak Watchlist</h1>

<div class="market-bar market-weak">
🇺🇸 US MARKET: 🔴 WEAK<br>
<span style="color:#8b949e;">
Breakouts are showing low follow-through.
</span>
</div>

<table class="table" id="watchlistTable">
<thead>
<tr>
<th>Symbol</th>
<th>Score</th>
<th>Break %</th>
<th>Chart</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div class="footer">
EdgeBreak Intelligence — Not financial advice.
</div>

</div>

<script>

// 🔥 LOAD DATA
fetch("watchlist.json")
  .then(res => res.json())
  .then(data => {

    // 🔥 GRADE-BASED SORT (MATCHES ENGINE)
    const gradeOrder = {
      "A+": 5,
      "A": 4,
      "B+": 3,
      "B": 2,
      "C": 1
    };

    data.sort((a, b) => {
      const gradeDiff = (gradeOrder[b.grade] || 0) - (gradeOrder[a.grade] || 0);
      if (gradeDiff !== 0) return gradeDiff;
      return b.score - a.score;
    });

    const tbody = document.querySelector("#watchlistTable tbody");

    data.forEach(item => {
      const row = document.createElement("tr");

      row.innerHTML = `
        <td>
          <a href="https://www.tradingview.com/chart/?symbol=NASDAQ:${item.symbol}" target="_blank">
            ${item.symbol}
          </a>
        </td>

        <td class="${getScoreClass(item.score)}">
          ${item.score}<br>
          <span style="font-size:12px; color:#8b949e;">
            ${item.grade}
          </span>
        </td>

        <td>${item.break}%</td>

        <td>
          <a href="https://www.tradingview.com/chart/?symbol=NASDAQ:${item.symbol}" target="_blank">
            View ↗
          </a>
        </td>
      `;

      tbody.appendChild(row);
    });

  });

// HELPERS
function getScoreClass(score) {
  if (score >= 50) return "score-elite";
  if (score >= 40) return "score-strong";
  return "score-watch";
}

</script>

</body>
</html>
