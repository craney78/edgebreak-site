<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Start Free Trial | EdgeBreak</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/dashboard.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>
  window.supabaseClient = supabase.createClient(
    "https://qmonyhukamuuunxxxdlk.supabase.co",
    "sb_publishable_WsyyDmOBFu7HiopALD_mJw_h05DKlw-",
  );
  </script>
</head>

<body class="login-page">

<div class="container">
  <div class="section" style="max-width:500px; margin:120px auto; padding:40px;">

    <h2>Create Your Account</h2>
    <p>Start your free trial and unlock EdgeBreak</p>

    <input id="email" type="email" placeholder="Email" class="input-field">
    <input id="password" type="password" placeholder="Password" class="input-field">

    <button id="signupBtn" class="nav-cta full-width">
      Start Free Trial
    </button>

    <div id="error" style="color:red; margin-top:10px;"></div>

  </div>
</div>

<script>
    
signupBtn.addEventListener("click", async () => {

  alert("CLICK WORKING");

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const errorBox = document.getElementById("error");

  console.log("STEP 1: CLICK");

  const { data, error } = await supabaseClient.auth.signUp({
    email,
    password
  });

  console.log("STEP 2: SIGNUP DONE", data, error);

  if (error) {
    errorBox.innerText = error.message;
    return;
  }

  const userId = data?.user?.id;

  console.log("STEP 3: USER ID", userId);

  await supabaseClient.auth.signOut();

  console.log("STEP 4: SIGNED OUT");

  const res = await fetch("https://courier-evacuate-letdown.ngrok-free.dev/create-checkout-session", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ userId })
  });

  console.log("STEP 5: FETCH RESPONSE", res);

  const session = await res.json();

  console.log("STEP 6: SESSION", session);

  if (!session.url) {
    errorBox.innerText = "Payment error. Try again.";
    return;
  }

  window.location.href = session.url;

});

</script>

</body>
</html>
