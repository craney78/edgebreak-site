<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Start Free Trial | EdgeBreak</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/dashboard.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>
    window.supabaseClient = supabase.createClient(
      "https://qmonyhukamuuunxxxdlk.supabase.co",
      "sb_publishable_WsyyDmOBFu7HiopALD_mJw_h05DKlw-"
    );
  </script>
<!-- 🔥 SIGNUP HERO WRAPPER -->
<div class="login-hero">

  <!-- FORM -->
  <div class="container">

    <div class="section" style="
      max-width:520px;
      margin:120px auto;
      padding:40px;
      border-radius:16px;
      box-shadow:0 20px 50px rgba(0,0,0,0.5);
    ">

      <!-- LOGO -->
      <div class="hero-logo-wrap">
        <img src="images/logo.png" class="hero-logo" width="90">
      </div>

      <!-- HEADLINE -->
      <h2 class="login-title">
        Start Your Free Trial
      </h2>

      <!-- SUBTEXT -->
      <p class="login-subtext">
        Get breakout alerts, trade tracking, and market insights delivered to you.
      </p>

      <!-- INPUTS -->
      <input id="email" type="email" placeholder="Email" class="input-field">
      <input id="password" type="password" placeholder="Password" class="input-field">
      <input id="phone" type="text" placeholder="Phone (for alerts)" class="input-field">

      <!-- BUTTON -->
      <button id="signupBtn" class="nav-cta full-width">
        Start Free Trial
      </button>

      <!-- TRUST LINE -->
      <p style="text-align:center; font-size:13px; opacity:0.6; margin-top:15px;">
        Alerts via email & SMS • Cancel anytime • No guesswork
      </p>

      <!-- ERROR -->
      <div id="error" class="error-text"></div>

    </div>

  </div>

</div>


<script>

const supabaseClient = window.supabaseClient;

document.addEventListener("DOMContentLoaded", () => {

  const signupBtn = document.getElementById("signupBtn");

  if (!signupBtn) {
    console.error("Signup button not found");
    return;
  }

  signupBtn.addEventListener("click", async () => {

    signupBtn.disabled = true;

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const errorBox = document.getElementById("error");

    console.log("STEP 1: CLICK");

    const { data, error } = await supabaseClient.auth.signUp({
      email,
      password
    });

    console.log("STEP 2: SIGNUP DONE", data, error);

    if (error) {
      errorBox.innerText = error.message;
      signupBtn.disabled = false;
      return;
    }

    const userId = data?.user?.id;

    console.log("STEP 3: USER ID", userId);

    await supabaseClient.auth.signOut();

    console.log("STEP 4: SIGNED OUT");

    const res = await fetch("https://courier-evacuate-letdown.ngrok-free.dev/create-checkout-session", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ userId })
    });

    console.log("STEP 5: FETCH RESPONSE", res);

    const session = await res.json();

    console.log("STEP 6: SESSION", session);

    if (!session.url) {
      errorBox.innerText = "Payment error. Try again.";
      signupBtn.disabled = false;
      return;
    }

    window.location.href = session.url;

  });

});

</script>

</body>
</html>
